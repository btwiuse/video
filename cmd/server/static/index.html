<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Film Pipeline Studio</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cinema: {
              900: '#0f0f14',
              800: '#1a1a24',
              700: '#252535',
              600: '#32324a',
              500: '#4a4a6a',
            }
          }
        }
      }
    }
  </script>
  <style>
    body { background: #0f0f14; color: #e5e5e5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .step-dot { transition: all 0.3s ease; }
    .pipeline-card { transition: all 0.2s ease; }
    .pipeline-card:hover { transform: translateY(-2px); }
    @keyframes pulse-glow { 0%,100% { box-shadow: 0 0 5px rgba(99,102,241,0.4); } 50% { box-shadow: 0 0 20px rgba(99,102,241,0.8); } }
    .running-glow { animation: pulse-glow 2s infinite; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    const { useState, useEffect, useRef, useCallback } = React;

    const API_BASE = window.location.origin;
    const STEP_NAMES = ["", "分镜生成", "视觉素材", "视频生成", "音频生成", "后期合成"];

    function api(url, opts = {}) {
      return fetch(`${API_BASE}${url}`, { ...opts, headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) } });
    }

    function StatusBadge({ status }) {
      const colors = {
        pending: 'bg-gray-600 text-gray-200',
        running: 'bg-indigo-600 text-indigo-100 running-glow',
        done: 'bg-emerald-600 text-emerald-100',
        failed: 'bg-red-600 text-red-100',
        canceled: 'bg-orange-600 text-orange-100',
        step_1: 'bg-blue-600 text-blue-100',
        step_2: 'bg-blue-600 text-blue-100',
        step_3: 'bg-purple-600 text-purple-100',
        step_4: 'bg-purple-600 text-purple-100',
        step_5: 'bg-purple-600 text-purple-100',
      };
      const labels = {
        pending: '待处理', running: '运行中', done: '完成', failed: '失败', canceled: '已取消',
        step_1: '步骤 1', step_2: '步骤 2', step_3: '步骤 3', step_4: '步骤 4', step_5: '步骤 5',
      };
      return <span className={`px-2 py-1 rounded text-xs font-semibold ${colors[status] || 'bg-gray-500 text-gray-100'}`}>{labels[status] || status}</span>;
    }

    function StepProgress({ currentStep }) {
      return (
        <div className="flex items-center gap-2 my-6">
          {[1,2,3,4,5].map(n => (
            <React.Fragment key={n}>
              <div className={`step-dot w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold ${
                n <= currentStep ? 'bg-indigo-500 text-white' : 'bg-cinema-700 text-gray-500'
              }`}>{n}</div>
              {n < 5 && <div className={`h-0.5 w-8 ${n < currentStep ? 'bg-indigo-500' : 'bg-cinema-700'}`} />}
            </React.Fragment>
          ))}
        </div>
      );
    }

    function ArtifactList({ pipelineId }) {
      const [artifacts, setArtifacts] = useState([]);
      const [loading, setLoading] = useState(false);
      const [expanded, setExpanded] = useState({});
      const [scriptText, setScriptText] = useState('');
      const [scriptLoading, setScriptLoading] = useState(false);
      const expandedRef = useRef({});
      useEffect(() => { expandedRef.current = expanded; }, [expanded]);

      const load = useCallback(async () => {
        setLoading(true);
        try {
          const res = await api(`/pipelines/${pipelineId}/artifacts`);
          if (res.ok) {
            const data = await res.json();
            setArtifacts(data.files || []);
          }
        } finally { setLoading(false); }
      }, [pipelineId]);

      useEffect(() => { load(); }, [load]);

      const download = async (name) => {
        try {
          const res = await api(`/pipelines/${pipelineId}/artifacts/${encodeURIComponent(name)}`);
          if (!res.ok) throw new Error('Download failed');
          const blob = await res.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = name;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
        } catch (e) { console.error(e); }
      };

      const fileCategory = (name) => {
        const ext = name.split('.').pop()?.toLowerCase();
        if (['png','jpg','jpeg','gif','webp'].includes(ext)) return 'image';
        if (['mp4','webm','mov'].includes(ext)) return 'video';
        if (['wav','mp3','m4a','flac'].includes(ext)) return 'audio';
        return 'text';
      };

      const viewJson = async (name) => {
        if (expandedRef.current[name]) {
          setExpanded(prev => {
            const next = { ...prev };
            delete next[name];
            return next;
          });
          return;
        }
        const cat = fileCategory(name);
        if (cat === 'text') {
          try {
            const res = await api(`/pipelines/${pipelineId}/artifacts/${encodeURIComponent(name)}`);
            if (!res.ok) throw new Error('Fetch failed');
            const text = await res.text();
            const MAX_PREVIEW = 50000;
            if (text.length > MAX_PREVIEW) {
              setExpanded(prev => ({ ...prev, [name]: text.substring(0, MAX_PREVIEW) + '\n\n... (文件过大，仅显示前 50KB，请下载查看完整内容)' }));
            } else {
              setExpanded(prev => ({ ...prev, [name]: text }));
            }
          } catch (e) { console.error(e); }
        } else {
          try {
            const res = await api(`/pipelines/${pipelineId}/artifacts/${encodeURIComponent(name)}`);
            if (!res.ok) throw new Error('Fetch failed');
            const blob = await res.blob();
            const url = URL.createObjectURL(blob);
            setExpanded(prev => ({ ...prev, [name]: url }));
          } catch (e) { console.error(e); }
        }
      };

      const toggleExpand = (name) => {
        setExpanded(prev => {
          const next = { ...prev };
          if (next[name]) {
            delete next[name];
          }
          return next;
        });
      };

      const copyToClipboard = (text, name) => {
        navigator.clipboard.writeText(text).then(() => alert('已复制: ' + name)).catch(() => alert('复制失败'));
      };

      return (
        <div className="mt-8">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-lg font-semibold text-white">产物文件</h3>
            <button onClick={load} disabled={loading} className="text-sm text-indigo-400 hover:text-indigo-300">
              {loading ? '刷新中...' : '刷新'}
            </button>
          </div>
          {artifacts.length === 0 && <p className="text-gray-500 text-sm">暂无产物文件</p>}
          <div className="space-y-2">
            <div className="bg-cinema-800 rounded border border-cinema-700 overflow-hidden">
              <div className="flex items-center justify-between p-3">
                <div className="flex-1 min-w-0">
                  <span className="text-white text-sm font-medium">剧本原文.txt</span>
                  <span className="text-gray-500 text-xs ml-2">原始剧本</span>
                </div>
                <div className="flex gap-2 ml-4">
                  <button onClick={async () => {
                    if (expandedRef.current['_script_']) {
                      setExpanded(prev => { const next = {...prev}; delete next['_script_']; return next; });
                      return;
                    }
                    setScriptLoading(true);
                    try {
                      const res = await api(`/pipelines/${pipelineId}/script`);
                      if (res.ok) {
                        const text = await res.text();
                        setScriptText(text);
                        setExpanded(prev => ({ ...prev, _script_: text }));
                      } else {
                        alert('无法加载剧本');
                      }
                    } catch (e) {
                      alert('加载失败: ' + e.message);
                    } finally {
                      setScriptLoading(false);
                    }
                  }} className="text-xs px-2 py-1 bg-cinema-600 hover:bg-cinema-500 rounded text-gray-200">
                    {expanded['_script_'] ? '收起' : '查看'}
                  </button>
                  <button onClick={async () => {
                    try {
                      const res = await api(`/pipelines/${pipelineId}/script`);
                      if (!res.ok) throw new Error('Download failed');
                      const blob = await res.blob();
                      const url = URL.createObjectURL(blob);
                      const a = document.createElement('a');
                      a.href = url;
                      a.download = '剧本原文.txt';
                      document.body.appendChild(a);
                      a.click();
                      document.body.removeChild(a);
                      URL.revokeObjectURL(url);
                    } catch (e) { console.error(e); }
                  }} className="text-xs px-2 py-1 bg-indigo-600 hover:bg-indigo-500 rounded text-white">
                    下载
                  </button>
                </div>
              </div>
              {expanded['_script_'] && (
                <div className="bg-cinema-900 p-4 border-t border-cinema-700 relative">
                  <div className="absolute top-2 right-2 flex gap-2">
                    <button onClick={() => copyToClipboard(expanded['_script_'], '剧本原文.txt')} className="text-gray-400 hover:text-white" title="复制">📋</button>
                    <button onClick={() => setExpanded(prev => { const next = {...prev}; delete next['_script_']; return next; })} className="text-gray-400 hover:text-white">✕</button>
                  </div>
                  <h4 className="text-sm font-semibold text-gray-300 mb-2">剧本原文.txt</h4>
                  <pre className="text-xs text-gray-300 overflow-auto max-h-96 whitespace-pre-wrap">{expanded['_script_']}</pre>
                </div>
              )}
            </div>
            {artifacts.map(f => (
              <div key={f.name} className="bg-cinema-800 rounded border border-cinema-700 overflow-hidden">
                <div className="flex items-center justify-between p-3">
                  <div className="flex-1 min-w-0">
                    <span className="text-white text-sm font-medium">{f.name}</span>
                    <span className="text-gray-500 text-xs ml-2">{(f.size / 1024).toFixed(1)} KB</span>
                  </div>
                  <div className="flex gap-2 ml-4">
                    <button onClick={() => viewJson(f.name)} className="text-xs px-2 py-1 bg-cinema-600 hover:bg-cinema-500 rounded text-gray-200">
                      {expanded[f.name] ? '收起' : '查看'}
                    </button>
                    <button onClick={() => download(f.name)} className="text-xs px-2 py-1 bg-indigo-600 hover:bg-indigo-500 rounded text-white">
                      下载
                    </button>
                  </div>
                </div>
                {expanded[f.name] && (
                  <div className="bg-cinema-900 p-4 border-t border-cinema-700 relative">
                    <div className="absolute top-2 right-2 flex gap-2">
                      {fileCategory(f.name) === 'text' && <button onClick={() => copyToClipboard(expanded[f.name], f.name)} className="text-gray-400 hover:text-white" title="复制">📋</button>}
                      <button onClick={() => toggleExpand(f.name)} className="text-gray-400 hover:text-white">✕</button>
                    </div>
                    <h4 className="text-sm font-semibold text-gray-300 mb-2">{f.name}</h4>
                    {fileCategory(f.name) === 'image' ? (
                      <img src={expanded[f.name]} alt={f.name} className="max-w-full rounded" />
                    ) : fileCategory(f.name) === 'video' ? (
                      <video src={expanded[f.name]} controls className="max-w-full rounded" />
                    ) : fileCategory(f.name) === 'audio' ? (
                      <audio src={expanded[f.name]} controls className="w-full" />
                    ) : (
                      <pre className="text-xs text-gray-300 overflow-auto max-h-96 whitespace-pre-wrap">{expanded[f.name]}</pre>
                    )}
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      );
    }

    function LogViewer({ pipelineId, isRunning }) {
      const [logs, setLogs] = useState('');
      const [loading, setLoading] = useState(false);
      const [autoScroll, setAutoScroll] = useState(true);
      const logContainerRef = useRef(null);

      const loadLogs = useCallback(async (userInitiated = false) => {
        if (userInitiated) setLoading(true);
        try {
          const res = await api(`/pipelines/${pipelineId}/logs`);
          if (res.ok) {
            const text = await res.text();
            setLogs(text);
          }
        } finally { if (userInitiated) setLoading(false); }
      }, [pipelineId]);

      useEffect(() => { loadLogs(); }, [loadLogs]);

      useEffect(() => {
        if (!isRunning) return;
        const t = setInterval(loadLogs, 1000);
        return () => clearInterval(t);
      }, [isRunning, loadLogs]);

      useEffect(() => {
        if (autoScroll && logContainerRef.current) {
          logContainerRef.current.scrollTop = logContainerRef.current.scrollHeight;
        }
      }, [logs, autoScroll]);

      const handleScroll = () => {
        if (!logContainerRef.current) return;
        const el = logContainerRef.current;
        const isAtBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 50;
        setAutoScroll(isAtBottom);
      };

      return (
        <div className="mt-8">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-lg font-semibold text-white">运行日志</h3>
            <div className="flex items-center gap-3">
              <label className="flex items-center gap-1 text-xs text-gray-400">
                <input type="checkbox" checked={autoScroll} onChange={(e) => setAutoScroll(e.target.checked)} />
                自动滚动
              </label>
              <button onClick={() => loadLogs(true)} disabled={loading} className="text-sm text-indigo-400 hover:text-indigo-300">
                {loading ? '刷新中...' : '刷新'}
              </button>
            </div>
          </div>
          <div
            ref={logContainerRef}
            onScroll={handleScroll}
            className="bg-cinema-900 border border-cinema-700 rounded p-4 h-96 overflow-auto font-mono text-xs text-gray-300 whitespace-pre-wrap"
          >
            {logs || <span className="text-gray-500">暂无日志</span>}
          </div>
        </div>
      );
    }

    function StoryboardViewer({ pipelineId }) {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(false);
      const [expandedScenes, setExpandedScenes] = useState({});

      const load = useCallback(async () => {
        setLoading(true);
        try {
          const res = await api(`/pipelines/${pipelineId}/artifacts/storyboard.json`);
          if (res.ok) setData(await res.json());
        } catch (e) { /* ignore */ }
        finally { setLoading(false); }
      }, [pipelineId]);

      useEffect(() => { load(); }, [load]);

      if (!data && loading) return <div className="mt-6 text-gray-500 text-sm">加载分镜中...</div>;
      if (!data) return null;

      const scenes = data.scenes || [];
      const characters = data.characters || [];
      const shots = data.shots || [];

      return (
        <div className="mt-8">
          <h3 className="text-lg font-semibold text-white mb-3">
            分镜概览
            <span className="text-gray-400 text-sm font-normal ml-2">
              {characters.length} 角色 · {scenes.length} 场景 · {shots.length} 镜头
            </span>
          </h3>
          <div className="space-y-3">
            {characters.length > 0 && (
              <div className="bg-cinema-800 rounded border border-cinema-700 p-3">
                <h4 className="text-sm font-semibold text-gray-300 mb-2">角色</h4>
                <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
                  {characters.map(c => (
                    <div key={c.ref_id} className="flex flex-col items-center gap-1">
                      <img
                        src={`/pipelines/${pipelineId}/artifacts/characters/${encodeURIComponent(c.ref_id)}_front.jpg`}
                        alt={c.ref_id}
                        className="w-20 h-20 object-cover rounded-lg bg-cinema-700"
                        onError={e => { e.target.style.display = 'none'; }}
                      />
                      <span className="text-xs text-gray-400 truncate max-w-full">{c.ref_id}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
            {scenes.map((scene, si) => {
              const sceneShots = shots.filter(s => s.full_shot_id?.startsWith(scene.scene_id));
              const isExpanded = expandedScenes[scene.scene_id];
              return (
                <div key={scene.scene_id} className="bg-cinema-800 rounded border border-cinema-700 overflow-hidden">
                  <div
                    className="flex items-center justify-between p-3 cursor-pointer hover:bg-cinema-750"
                    onClick={() => setExpandedScenes(prev => ({ ...prev, [scene.scene_id]: !prev[scene.scene_id] }))}
                  >
                    <div className="flex-1 min-w-0 flex items-center gap-2">
                      <img
                        src={`/pipelines/${pipelineId}/artifacts/scenes/${scene.scene_id}_detail.jpg`}
                        alt={scene.scene_id}
                        className="w-12 h-8 object-cover rounded flex-shrink-0 bg-cinema-700"
                        onError={e => { e.target.style.display = 'none'; }}
                      />
                      <div>
                        <span className="text-white text-sm font-medium">{scene.scene_id}</span>
                        <span className="text-gray-500 text-xs ml-2">{sceneShots.length} 镜</span>
                      </div>
                    </div>
                    <span className="text-gray-400 text-xs">{isExpanded ? '收起' : '展开'}</span>
                  </div>
                  {isExpanded && (
                    <div className="border-t border-cinema-700">
                      {sceneShots.map((shot, i) => (
                        <div key={shot.full_shot_id} className="p-3 bg-cinema-900/50 flex gap-3 border-b border-cinema-700">
                          <img
                            src={`/pipelines/${pipelineId}/artifacts/shots/${shot.full_shot_id}/${shot.full_shot_id}_startframe.jpg`}
                            alt={shot.full_shot_id}
                            className="w-24 h-14 object-cover rounded flex-shrink-0 bg-cinema-700"
                            onError={e => {
                              e.target.src = `/pipelines/${pipelineId}/artifacts/shots/${shot.full_shot_id}/${shot.full_shot_id}_startframe.png`;
                              e.target.onerror = () => { e.target.style.display = 'none'; };
                            }}
                          />
                          <div className="flex-1 min-w-0">
                            <div className="flex items-center gap-2 mb-1">
                              <span className="text-xs font-bold text-indigo-400">{shot.full_shot_id}</span>
                              <span className="text-xs text-gray-400 bg-cinema-700 px-1.5 py-0.5 rounded">{shot.transition_type || '-'}</span>
                              <span className="text-xs text-gray-500">{shot.duration_sec != null ? (Number.isInteger(shot.duration_sec) ? shot.duration_sec : shot.duration_sec.toFixed(1)) + '秒' : '-'}</span>
                            </div>
                            <div className="text-xs text-gray-500">
                              {`Scene ${si+1} 第${i+1}镜`}
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function PipelineDetail({ pipeline, onRefresh, onBack }) {
      const [actionLoading, setActionLoading] = useState(false);
      const [summary, setSummary] = useState(null);
      const [summaryLoading, setSummaryLoading] = useState(false);

      useEffect(() => {
        let cancelled = false;
        setSummary(null);
        setSummaryLoading(true);
        api(`/pipelines/${pipeline.pipeline_id}/summarize`)
          .then(res => res.ok ? res.json() : Promise.resolve(null))
          .then(data => {
            if (!cancelled && data) {
              setSummary(data);
            }
          })
          .catch(() => {})
          .finally(() => {
            if (!cancelled) setSummaryLoading(false);
          });
        return () => { cancelled = true; };
      }, [pipeline.pipeline_id]);

      const getCurrentStep = () => {
        if (pipeline.status === 'done') return 5;
        if (pipeline.status === 'running') return pipeline.step || 0;
        if (pipeline.status?.startsWith('step_')) {
          const n = parseInt(pipeline.status.split('_')[1]);
          return Math.max(0, n - 1);
        }
        return pipeline.step || 0;
      };
      const currentStep = getCurrentStep();

      const pid = pipeline.pipeline_id;

      const canRunStep = (n) => {
        if (actionLoading) return false;
        if (pipeline.status === 'done') return false;
        if (n <= currentStep) return true;
        return false;
      };

      const runStep = async (step) => {
        setActionLoading(true);
        try {
          await api(`/pipelines/${pid}/steps/${step}`, { method: 'POST' });
          setTimeout(onRefresh, 1000);
        } finally { setActionLoading(false); }
      };

      const runAll = async () => {
        setActionLoading(true);
        try {
          const startStep = currentStep === 5 ? 1 : currentStep + 1;
          for (let s = startStep; s <= 5; s++) {
            await api(`/pipelines/${pid}/steps/${s}`, { method: 'POST' });
            const startTime = Date.now();
            const timeout = 30 * 60 * 1000; // 30 minutes
            while (true) {
              await new Promise(r => setTimeout(r, 3000));
              if (Date.now() - startTime > timeout) {
                alert(`步骤 ${s} 超时 (30分钟)，请检查后端状态`);
                break;
              }
              const res = await api(`/pipelines/${pid}`);
              if (!res.ok) break;
              const data = await res.json();
              const status = data.status;
              if (status === 'failed' || status === 'canceled') {
                alert(`步骤 ${s} 失败: ${data.error || status}`);
                break;
              }
              const currentStep = status?.startsWith('step_') ? parseInt(status.split('_')[1]) : (status === 'done' ? 5 : 0);
              if (currentStep > s || status === 'done') break;
            }
          }
          onRefresh();
        } finally { setActionLoading(false); }
      };

      const del = async () => {
        if (!confirm('确定删除此 pipeline 及其所有产物?')) return;
        try {
          const res = await api(`/pipelines/${pid}`, { method: 'DELETE' });
          if (!res.ok) {
            alert(`删除失败: HTTP ${res.status}`);
            return;
          }
          onBack();
        } catch (e) {
          alert(`删除失败: ${e.message}`);
        }
      };

      return (
        <div className="bg-cinema-800 rounded-lg p-6 border border-cinema-700">
          <div className="flex items-start justify-between mb-4">
            <div className="flex-1 min-w-0">
              <h2 className="text-xl font-bold text-white truncate" title={pipeline.name}>{pipeline.name || 'Untitled Pipeline'}</h2>
              {summaryLoading && <p className="text-gray-400 text-xs mt-1">正在生成摘要...</p>}
              {summary && summary.summary && (
                <p className="text-gray-300 text-sm mt-1">{summary.summary}</p>
              )}
              <div className="flex items-center gap-3 mt-2">
                <StatusBadge status={pipeline.status} />
                <span className="text-gray-400 text-sm">步骤 {currentStep}/5</span>
                {pipeline.duration && <span className="text-gray-400 text-xs">运行时长: {pipeline.duration}</span>}
              </div>
            </div>
            <button onClick={del} className="text-red-400 hover:text-red-300 text-sm px-3 py-1 bg-cinema-700 rounded ml-4">删除</button>
          </div>

          <StepProgress currentStep={currentStep} />

          {pipeline.error && (
            <div className="bg-red-900/30 border border-red-700 text-red-200 p-3 rounded text-sm mb-4">
              {pipeline.error}
            </div>
          )}

          <div className="grid grid-cols-5 gap-2 mb-6">
            {[1,2,3,4,5].map(n => {
              const isActive = pipeline.status === 'running' && pipeline.step === n;
              const isDone = n <= currentStep || pipeline.status === 'done';
              return (
                <button
                  key={n}
                  onClick={() => runStep(n)}
                  disabled={!canRunStep(n)}
                  className={`py-3 px-2 rounded text-sm font-medium transition relative ${
                    isActive
                      ? 'bg-indigo-600 text-white ring-2 ring-indigo-400'
                      : isDone
                        ? 'bg-indigo-600 hover:bg-indigo-500 text-white'
                        : 'bg-cinema-700 text-gray-400'
                  } ${!canRunStep(n) ? 'opacity-50 cursor-not-allowed' : ''}`}
                >
                  <div className="font-bold">{n}</div>
                  <div className="text-xs opacity-80">{STEP_NAMES[n]}</div>
                </button>
              );
            })}
          </div>

          <div className="flex gap-3 mb-4">
            <button onClick={runAll} disabled={actionLoading || pipeline.status === 'done'} className="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 disabled:bg-gray-600 text-white rounded font-medium text-sm">
              运行全部步骤
            </button>
            <button onClick={onRefresh} disabled={actionLoading} className="px-4 py-2 bg-cinema-600 hover:bg-cinema-500 text-gray-200 rounded text-sm">
              刷新状态
            </button>
          </div>

          <StoryboardViewer pipelineId={pid} />
          <LogViewer pipelineId={pid} isRunning={pipeline.status === 'running' || pipeline.status?.startsWith('step_')} />

          <ArtifactList pipelineId={pid} />

          <div className="mt-6 text-xs text-gray-500">
            创建时间: {new Date(pipeline.created_at).toLocaleString()}<br/>
            更新时间: {new Date(pipeline.updated_at).toLocaleString()}
          </div>
        </div>
      );
    }

    function CreatePipeline({ onCreated }) {
      const [scriptFile, setScriptFile] = useState(null);
      const [scriptText, setScriptText] = useState('');
      const [submitting, setSubmitting] = useState(false);
      const [error, setError] = useState('');
      const fileRef = useRef();

      const handleFile = (e) => {
        const f = e.target.files[0];
        if (f) {
          setScriptFile(f);
          const reader = new FileReader();
          reader.onload = (ev) => setScriptText(ev.target.result);
          reader.readAsText(f);
        }
      };

      const submit = async () => {
        setError('');
        if (!scriptFile && !scriptText.trim()) {
          setError('请上传剧本文件或输入剧本内容');
          return;
        }
        setSubmitting(true);
        try {
          const fd = new FormData();
          if (scriptFile) {
            fd.append('script', scriptFile, scriptFile.name || 'script.txt');
          } else {
            const blob = new Blob([scriptText], { type: 'text/plain' });
            fd.append('script', blob, 'script.txt');
          }
          const res = await fetch(`${API_BASE}/pipelines`, { method: 'POST', body: fd });
          if (!res.ok) {
            const txt = await res.text();
            throw new Error(txt || `HTTP ${res.status}`);
          }
          const data = await res.json();
          onCreated(data.pipeline_id);
        } catch (e) {
          setError(e.message);
        } finally { setSubmitting(false); }
      };

      return (
        <div className="bg-cinema-800 rounded-lg p-6 border border-cinema-700">
          <h2 className="text-lg font-bold text-white mb-4">创建新 Pipeline</h2>
          {error && <div className="bg-red-900/30 border border-red-700 text-red-200 p-3 rounded text-sm mb-4">{error}</div>}
          <div className="space-y-4">
            <div>
              <label className="block text-sm text-gray-300 mb-1">上传剧本文件</label>
              <input ref={fileRef} type="file" accept=".txt,.md" onChange={handleFile} className="block w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-cinema-600 file:text-gray-200 hover:file:bg-cinema-500"/>
            </div>
            <div className="text-center text-gray-500 text-sm">或</div>
            <div>
              <label className="block text-sm text-gray-300 mb-1">剧本内容</label>
              <textarea
                value={scriptText}
                onChange={(e) => { setScriptText(e.target.value); setScriptFile(null); if(fileRef.current) fileRef.current.value = ''; }}
                rows={8}
                className="w-full bg-cinema-900 border border-cinema-700 rounded p-3 text-gray-200 text-sm focus:outline-none focus:border-indigo-500"
                placeholder="在此粘贴剧本内容..."
              />
            </div>
            <button onClick={submit} disabled={submitting} className="w-full py-2 bg-indigo-600 hover:bg-indigo-500 disabled:bg-gray-600 text-white rounded font-medium">
              {submitting ? '创建中...' : '创建 Pipeline'}
            </button>
          </div>
        </div>
      );
    }

    function PipelineList({ onSelect, onCreateNew }) {
      const [items, setItems] = useState([]);
      const [loading, setLoading] = useState(true);
      const [viewMode, setViewMode] = useState('grid'); // 'grid' | 'list'

      const load = useCallback(async () => {
        setLoading(true);
        try {
          const res = await api('/pipelines');
          if (res.ok) {
            const data = await res.json();
            setItems(data.pipelines || []);
          }
        } finally { setLoading(false); }
      }, []);

      useEffect(() => { load(); const t = setInterval(load, 5000); return () => clearInterval(t); }, []);

      const sorted = [...items].sort((a, b) => {
        const ta = new Date(a.created_at).getTime();
        const tb = new Date(b.created_at).getTime();
        return viewMode === 'list' ? ta - tb : tb - ta; // list: oldest first, grid: newest first
      });

      const formatDuration = (d) => {
        if (!d) return '';
        return d;
      };

      if (viewMode === 'grid') {
        return (
          <div>
            <div className="flex items-center justify-between mb-3">
              <div />
              <button onClick={() => setViewMode('list')} className="text-sm text-indigo-400 hover:text-indigo-300">列表视图</button>
            </div>
            {loading && items.length === 0 && <p className="text-gray-500">加载中...</p>}
            {items.length === 0 && !loading && (
              <div className="text-center py-16">
                <p className="text-gray-500 mb-4">暂无 Pipeline</p>
                <button onClick={onCreateNew} className="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded">创建 Pipeline</button>
              </div>
            )}
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
              {sorted.map(p => (
                <div key={p.pipeline_id} onClick={() => onSelect(p.pipeline_id)} className="pipeline-card bg-cinema-800 p-5 rounded-lg border border-cinema-700 cursor-pointer">
                  <div className="flex items-center justify-between mb-2">
                    <span className="text-white text-sm font-medium truncate" title={p.name}>{p.name || p.pipeline_id.slice(-8)}</span>
                    <StatusBadge status={p.status} />
                  </div>
                  <div className="text-gray-400 text-xs">步骤 {p.step}/5</div>
                  <div className="mt-3 w-full bg-cinema-700 rounded-full h-1.5">
                    <div className="bg-indigo-500 h-1.5 rounded-full" style={{ width: `${(p.step / 5) * 100}%` }} />
                  </div>
                  <div className="mt-3 text-xs text-gray-500">{new Date(p.updated_at).toLocaleString()}</div>
                  {p.duration && <div className="mt-1 text-xs text-gray-500">运行时长: {formatDuration(p.duration)}</div>}
                </div>
              ))}
            </div>
          </div>
        );
      }

      return (
        <div>
          <div className="flex items-center justify-between mb-3">
            <div />
            <button onClick={() => setViewMode('grid')} className="text-sm text-indigo-400 hover:text-indigo-300">卡片视图</button>
          </div>
          {loading && items.length === 0 && <p className="text-gray-500">加载中...</p>}
          {items.length === 0 && !loading && (
            <div className="text-center py-16">
              <p className="text-gray-500 mb-4">暂无 Pipeline</p>
              <button onClick={onCreateNew} className="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded">创建 Pipeline</button>
            </div>
          )}
          <div className="bg-cinema-800 rounded-lg border border-cinema-700 overflow-hidden">
            <div className="grid grid-cols-12 gap-4 p-3 bg-cinema-700 text-xs text-gray-300 font-semibold">
              <div className="col-span-4">名称</div>
              <div className="col-span-2">状态</div>
              <div className="col-span-1">步骤</div>
              <div className="col-span-3">创建时间</div>
              <div className="col-span-2">运行时长</div>
            </div>
            {sorted.map(p => (
              <div key={p.pipeline_id} onClick={() => onSelect(p.pipeline_id)} className="grid grid-cols-12 gap-4 p-3 border-t border-cinema-700 cursor-pointer hover:bg-cinema-700/50">
                <div className="col-span-4 text-white text-sm font-medium truncate" title={p.name}>{p.name || p.pipeline_id.slice(-8)}</div>
                <div className="col-span-2"><StatusBadge status={p.status} /></div>
                <div className="col-span-1 text-gray-400 text-xs">步骤 {p.step}/5</div>
                <div className="col-span-3 text-gray-400 text-xs">{new Date(p.created_at).toLocaleString()}</div>
                <div className="col-span-2 text-gray-400 text-xs">{formatDuration(p.duration) || '-'}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function App() {
      const [pipelines, setPipelines] = useState([]);
      const [selected, setSelected] = useState(null);
      const [health, setHealth] = useState(null);
      const [currentView, setCurrentView] = useState('list');
      const [pipelineId, setPipelineId] = useState(null);
      const pollRef = useRef(null);

      const getHashView = () => {
        const hash = window.location.hash.replace('#', '');
        if (hash.startsWith('/pipelines/')) return { view: 'detail', id: hash.split('/')[2] };
        if (hash === '/create') return { view: 'create', id: null };
        return { view: 'list', id: null };
      };

      const navigateTo = (view, id = null) => {
        if (view === 'detail' && id) {
          window.location.hash = `#/pipelines/${id}`;
        } else if (view === 'create') {
          window.location.hash = '#/create';
        } else {
          window.location.hash = '#';
        }
      };

      const refreshSelected = useCallback(async () => {
        if (!pipelineId) return;
        try {
          const res = await api(`/pipelines/${pipelineId}`);
          if (res.ok) {
            const data = await res.json();
            setSelected(data);
          }
        } catch (e) { console.error(e); }
      }, [pipelineId]);

      // Sync state with hash
      useEffect(() => {
        const onHashChange = () => {
          const { view: v, id } = getHashView();
          if (v === 'detail' && id) {
            api(`/pipelines/${id}`).then(res => {
              if (res.ok) {
                res.json().then(data => {
                  setSelected(data);
                  setCurrentView('detail');
                  setPipelineId(id);
                });
              } else {
                // Pipeline doesn't exist on server (e.g., Railway restart)
                navigateTo('list');
              }
            });
          } else if (v === 'create') {
            setCurrentView('create');
            setPipelineId(null);
            setSelected(null);
          } else {
            setCurrentView('list');
            setPipelineId(null);
            setSelected(null);
          }
        };
        window.addEventListener('hashchange', onHashChange);
        // Initial load from hash
        onHashChange();
        return () => window.removeEventListener('hashchange', onHashChange);
      }, []);

      // Poll when running
      useEffect(() => {
        if (currentView === 'detail' && selected && (selected.status === 'running' || selected.status?.startsWith('step_'))) {
          pollRef.current = setInterval(refreshSelected, 3000);
        } else if (pollRef.current) {
          clearInterval(pollRef.current);
          pollRef.current = null;
        }
        return () => { if (pollRef.current) clearInterval(pollRef.current); };
      }, [currentView, selected, refreshSelected]);

      const selectPipeline = async (id) => {
        navigateTo('detail', id);
      };

      // Initial health check
      useEffect(() => {
        (async () => {
          try {
            const res = await api('/health');
            setHealth(res.ok);
          } catch (e) { setHealth(false); }
        })();
      }, []);

      return (
        <div className="min-h-screen flex flex-col">
          <header className="bg-cinema-800 border-b border-cinema-700 px-6 py-4 flex items-center justify-between">
            <button onClick={() => navigateTo('list')} className="flex items-center gap-3 hover:opacity-80 transition">
              <div className="w-8 h-8 bg-indigo-600 rounded flex items-center justify-center text-white font-bold text-lg">F</div>
              <h1 className="text-xl font-bold text-white">Film Pipeline Studio</h1>
            </button>
            <div className="flex items-center gap-4">
              <div className="flex items-center gap-2">
                <div className={`w-2 h-2 rounded-full ${health ? 'bg-emerald-400' : 'bg-red-500'}`} />
                <span className="text-sm text-gray-400">{health ? '服务正常' : '服务离线'}</span>
              </div>
              <button onClick={() => navigateTo('create')} className="text-sm px-3 py-1.5 bg-indigo-600 hover:bg-indigo-500 text-white rounded">新建 Pipeline</button>
            </div>
          </header>

          <main className="flex-1 p-6 overflow-auto">
            {currentView === 'create' && (
              <div className="max-w-2xl mx-auto">
                <button onClick={() => navigateTo('list')} className="text-sm text-gray-400 hover:text-white mb-4">← 返回列表</button>
                <CreatePipeline onCreated={(id) => { selectPipeline(id); }} />
              </div>
            )}

            {currentView === 'list' && (
              <div>
                <div className="flex items-center justify-between mb-6">
                  <h2 className="text-lg font-semibold text-white">Pipeline 列表</h2>
                </div>
                <PipelineList onSelect={selectPipeline} onCreateNew={() => navigateTo('create')} />
              </div>
            )}

            {currentView === 'detail' && selected && (
              <div className="max-w-4xl mx-auto">
                <button onClick={() => navigateTo('list')} className="text-sm text-gray-400 hover:text-white mb-4">← 返回列表</button>
                <PipelineDetail pipeline={selected} onRefresh={refreshSelected} onBack={() => navigateTo('list')} />
              </div>
            )}
          </main>

          <footer className="bg-cinema-800 border-t border-cinema-700 px-6 py-3 text-center text-xs text-gray-500">
            Film Pipeline Studio — AI Screenplay to Film Pipeline
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
