<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Film Pipeline Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        colors: {
          transparent: 'transparent',
          current: 'currentColor',
          ink: {
            950: '#0d0c0b',
            900: '#1a1816',
            800: '#252220',
            700: '#34302d',
            600: '#4a4440',
          },
          brass: {
            400: '#dbb95d',
            500: '#c9a84c',
            600: '#b8963e',
          },
          stone: {
            100: '#f0ede8',
            200: '#e0dcd5',
            300: '#c4bfb7',
            400: '#a09890',
            500: '#7a736b',
          },
          leaf: {
            400: '#6aa07a',
            500: '#5a8a6a',
            600: '#4a7359',
          },
          clay: {
            400: '#b86a62',
            500: '#a8524a',
            600: '#8a423c',
          },
        },
        fontFamily: {
          heading: ['"Playfair Display"', 'Georgia', 'serif'],
          sans: ['"DM Sans"', 'system-ui', 'sans-serif'],
          mono: ['"JetBrains Mono"', 'SF Mono', 'monospace'],
        },
        extend: {
          keyframes: {
            'pulse-brass': {
              '0%, 100%': { boxShadow: '0 0 4px rgba(201,168,76,0.3)' },
              '50%': { boxShadow: '0 0 16px rgba(201,168,76,0.6)' },
            },
            'shimmer': {
              '0%': { backgroundPosition: '-200% 0' },
              '100%': { backgroundPosition: '200% 0' },
            },
          },
          animation: {
            'pulse-brass': 'pulse-brass 2s ease-in-out infinite',
            'shimmer': 'shimmer 1.5s ease-in-out infinite',
          },
        },
      },
    }
  </script>
  <style>
    body {
      background: #0d0c0b;
      color: #f0ede8;
      font-family: 'DM Sans', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    ::selection { background: rgba(201,168,76,0.3); color: #f0ede8; }
    .pipeline-card { transition: all 0.2s ease-out; }
    .pipeline-card:hover { transform: translateY(-3px); }
    .step-btn { transition: all 0.15s ease-out; }
    .step-btn:active { transform: scale(0.96); }
    .nav-btn { transition: all 0.15s ease-out; }
    .nav-btn:hover { transform: translateY(-1px); }
    .log-viewer::-webkit-scrollbar { width: 6px; }
    .log-viewer::-webkit-scrollbar-track { background: #1a1816; }
    .log-viewer::-webkit-scrollbar-thumb { background: #34302d; border-radius: 3px; }
    .shimmer-bg {
      background: linear-gradient(90deg, #1a1816 25%, #252220 50%, #1a1816 75%);
      background-size: 200% 100%;
    }
    @media (prefers-reduced-motion: reduce) {
      *, ::before, ::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
      .pipeline-card:hover { transform: none; }
      .step-btn:active { transform: none; }
      .nav-btn:hover { transform: none; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    const { useState, useEffect, useRef, useCallback } = React;

    const API_BASE = window.location.origin;
    const STEP_NAMES = ["", "分镜生成", "视觉素材", "视频生成", "音频生成", "后期合成"];

    function api(url, opts = {}) {
      return fetch(`${API_BASE}${url}`, { ...opts, headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) } });
    }

    function StatusBadge({ status }) {
      const styles = {
        pending:     'bg-ink-700 text-stone-400',
        running:     'bg-brass-500/20 text-brass-400 animate-pulse-brass',
        done:        'bg-leaf-500/20 text-leaf-400',
        failed:      'bg-clay-500/20 text-clay-400',
        canceled:    'bg-ink-700 text-stone-400',
        step_1:      'bg-brass-500/10 text-brass-400',
        step_2:      'bg-brass-500/10 text-brass-400',
        step_3:      'bg-brass-500/10 text-brass-400',
        step_4:      'bg-brass-500/10 text-brass-400',
        step_5:      'bg-brass-500/10 text-brass-400',
      };
      const labels = {
        pending: '待处理', running: '运行中', done: '完成', failed: '失败', canceled: '已取消',
        step_1: '步骤 1', step_2: '步骤 2', step_3: '步骤 3', step_4: '步骤 4', step_5: '步骤 5',
      };
      return (
        <span className={`inline-flex items-center gap-1.5 px-2.5 py-1 rounded text-xs font-medium ${styles[status] || 'bg-ink-700 text-stone-400'}`}>
          {status === 'running' && <span className="w-1.5 h-1.5 rounded-full bg-brass-400" />}
          {labels[status] || status}
        </span>
      );
    }

    function StepProgress({ currentStep }) {
      return (
        <div className="relative my-8">
          <div className="absolute top-5 left-0 right-0 h-px bg-ink-700" />
          <div className="relative flex justify-between">
            {[1,2,3,4,5].map(n => {
              const done = n <= currentStep;
              const active = n === currentStep + 1;
              return (
                <div key={n} className="flex flex-col items-center">
                  <div className={`relative z-10 w-10 h-10 rounded-full flex items-center justify-center text-sm font-semibold transition-all duration-300 ${
                    done
                      ? 'bg-brass-500 text-ink-950'
                      : active
                        ? 'bg-brass-500/20 text-brass-400 ring-1 ring-brass-500/50'
                        : 'bg-ink-800 text-stone-400'
                  }`}>
                    {done ? '✓' : n}
                  </div>
                  <span className={`mt-2 text-xs font-medium ${done ? 'text-stone-200' : 'text-stone-400'}`}>
                    {STEP_NAMES[n]}
                  </span>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function FileRow({ file, level, pipelineId, expanded, onView, onDownload, onCopy, onToggle }) {
        const paddingLeft = 16 + level * 20;
        return (
          <div className="border-b border-ink-800 last:border-b-0">
            <div className="flex items-center justify-between py-1.5 pr-3" style={{ paddingLeft }}>
              <div className="flex items-center gap-2 min-w-0 flex-1">
                <span className="text-stone-500 flex-shrink-0 text-xs">📄</span>
                <span className="text-stone-100 text-sm truncate">{file.name.split('/').pop()}</span>
                <span className="text-stone-500 text-xs flex-shrink-0">{(file.size / 1024).toFixed(1)} KB</span>
              </div>
              <div className="flex gap-1.5 ml-3 flex-shrink-0">
                <button onClick={() => onView(file.name)} className="text-xs px-2 py-0.5 bg-ink-700 hover:bg-ink-600 rounded text-stone-200 transition-colors">
                  {expanded[file.name] ? '收起' : '查看'}
                </button>
                <button onClick={() => onDownload(file.name)} className="text-xs px-2 py-0.5 bg-brass-500 hover:bg-brass-400 rounded text-ink-950 font-medium transition-colors">
                  下载
                </button>
              </div>
            </div>
            {expanded[file.name] && (
              <div className="bg-ink-950 p-3 border-t border-ink-700 relative" style={{ paddingLeft: paddingLeft + 8 }}>
                <div className="absolute top-2 right-2 flex gap-2">
                  {(fileCategory(file.name) === 'text') && <button onClick={() => onCopy(expanded[file.name], file.name)} className="text-stone-400 hover:text-stone-200 transition-colors text-xs" title="复制">📋</button>}
                  <button onClick={() => onToggle(file.name)} className="text-stone-400 hover:text-stone-200 transition-colors text-xs">✕</button>
                </div>
                <h4 className="text-xs font-semibold text-stone-400 mb-1.5">{file.name}</h4>
                {fileCategory(file.name) === 'image' ? (
                  <img src={expanded[file.name]} alt={file.name} className="max-w-full rounded" />
                ) : fileCategory(file.name) === 'video' ? (
                  <video src={expanded[file.name]} controls className="max-w-full rounded" />
                ) : fileCategory(file.name) === 'audio' ? (
                  <audio src={expanded[file.name]} controls className="w-full" />
                ) : (
                  <pre className="text-xs text-stone-300 overflow-auto max-h-96 whitespace-pre-wrap">{expanded[file.name]}</pre>
                )}
              </div>
            )}
          </div>
        );
    }

    function DirNode({ name, node, level, path, treeOpen, onToggleDir, expanded, onView, onDownload, onCopy, onToggle }) {
        const fullPath = path ? `${path}/${name}` : name;
        const isOpen = treeOpen[fullPath] !== undefined ? treeOpen[fullPath] : level < 2;
        const paddingLeft = 16 + level * 20;

        const childDirs = Object.keys(node.__children || {}).sort();
        const childFiles = (node.__files || []).sort((a, b) => a.name.localeCompare(b.name));

        return (
          <div>
            <div
              className="flex items-center gap-1.5 py-1.5 pr-3 cursor-pointer hover:bg-ink-800/50 transition-colors select-none"
              style={{ paddingLeft }}
              onClick={() => onToggleDir(fullPath)}
            >
              <span className="text-stone-400 flex-shrink-0 text-xs w-3 text-center transition-transform" style={{ transform: isOpen ? 'rotate(90deg)' : 'none' }}>
                ▶
              </span>
              <span className="text-stone-500 flex-shrink-0 text-xs">📁</span>
              <span className="text-stone-200 text-sm font-medium">{name}</span>
              <span className="text-stone-600 text-xs ml-1">
                {childDirs.length + childFiles.length}项
              </span>
            </div>
            {isOpen && (
              <div>
                {childDirs.map(d => (
                  <DirNode key={d} name={d} node={node.__children[d]} level={level + 1} path={fullPath}
                    treeOpen={treeOpen} onToggleDir={onToggleDir}
                    expanded={expanded} onView={onView} onDownload={onDownload} onCopy={onCopy} onToggle={onToggle} />
                ))}
                {childFiles.map(f => (
                  <FileRow key={f.name} file={f} level={level + 1}
                    pipelineId={pipelineId} expanded={expanded}
                    onView={onView} onDownload={onDownload} onCopy={onCopy} onToggle={onToggle} />
                ))}
              </div>
            )}
          </div>
        );
    }

    function ArtifactList({ pipelineId }) {
      const [artifacts, setArtifacts] = useState([]);
      const [loading, setLoading] = useState(false);
      const [expanded, setExpanded] = useState({});
      const [treeOpen, setTreeOpen] = useState({});
      const [scriptText, setScriptText] = useState('');
      const [scriptLoading, setScriptLoading] = useState(false);
      const expandedRef = useRef({});
      useEffect(() => { expandedRef.current = expanded; }, [expanded]);

      const load = useCallback(async () => {
        setLoading(true);
        try {
          const res = await api(`/pipelines/${pipelineId}/artifacts`);
          if (res.ok) {
            const data = await res.json();
            setArtifacts(data.files || []);
          }
        } finally { setLoading(false); }
      }, [pipelineId]);

      useEffect(() => { load(); }, [load]);

      const download = useCallback(async (name) => {
        try {
          const res = await api(`/pipelines/${pipelineId}/artifacts/${encodeURIComponent(name)}`);
          if (!res.ok) throw new Error('Download failed');
          const blob = await res.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = name;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
        } catch (e) { console.error(e); }
      }, [pipelineId]);

      const fileCategory = (name) => {
        const ext = name.split('.').pop()?.toLowerCase();
        if (['png','jpg','jpeg','gif','webp'].includes(ext)) return 'image';
        if (['mp4','webm','mov'].includes(ext)) return 'video';
        if (['wav','mp3','m4a','flac'].includes(ext)) return 'audio';
        return 'text';
      };

      const viewJson = useCallback(async (name) => {
        if (expandedRef.current[name]) {
          setExpanded(prev => { const next = { ...prev }; delete next[name]; return next; });
          return;
        }
        const cat = fileCategory(name);
        if (cat === 'text') {
          try {
            const res = await api(`/pipelines/${pipelineId}/artifacts/${encodeURIComponent(name)}`);
            if (!res.ok) throw new Error('Fetch failed');
            const text = await res.text();
            const MAX_PREVIEW = 50000;
            if (text.length > MAX_PREVIEW) {
              setExpanded(prev => ({ ...prev, [name]: text.substring(0, MAX_PREVIEW) + '\n\n... (文件过大，仅显示前 50KB，请下载查看完整内容)' }));
            } else {
              setExpanded(prev => ({ ...prev, [name]: text }));
            }
          } catch (e) { console.error(e); }
        } else {
          try {
            const res = await api(`/pipelines/${pipelineId}/artifacts/${encodeURIComponent(name)}`);
            if (!res.ok) throw new Error('Fetch failed');
            const blob = await res.blob();
            const url = URL.createObjectURL(blob);
            setExpanded(prev => ({ ...prev, [name]: url }));
          } catch (e) { console.error(e); }
        }
      }, [pipelineId]);

      const toggleExpand = useCallback((name) => {
        setExpanded(prev => { const next = { ...prev }; if (next[name]) delete next[name]; return next; });
      }, []);

      const copyToClipboard = useCallback((text, name) => {
        navigator.clipboard.writeText(text).then(() => alert('已复制: ' + name)).catch(() => alert('复制失败'));
      }, []);

      function buildTree(files) {
        const root = {};
        for (const f of files) {
          const parts = f.name.split('/');
          let node = root;
          for (let i = 0; i < parts.length - 1; i++) {
            const dir = parts[i];
            if (!node.__children) node.__children = {};
            if (!node.__children[dir]) node.__children[dir] = {};
            node = node.__children[dir];
          }
          if (!node.__files) node.__files = [];
          node.__files.push(f);
        }
        return root;
      }

      const tree = React.useMemo(() => buildTree(artifacts), [artifacts]);
      const topDirs = React.useMemo(() => Object.keys(tree.__children || {}).sort(), [tree]);
      const rootFiles = React.useMemo(() => (tree.__files || []).sort((a, b) => a.name.localeCompare(b.name)), [tree]);

      const toggleDir = useCallback((path) => {
        setTreeOpen(prev => ({ ...prev, [path]: !(prev[path] !== undefined ? prev[path] : true) }));
      }, []);

      return (
        <div className="mt-10">
          <div className="flex items-center justify-between mb-4">
            <h3 className="font-heading text-lg font-semibold text-stone-100">产物文件</h3>
            <button onClick={load} disabled={loading} className="nav-btn text-sm text-stone-400 hover:text-brass-400 transition-colors">
              {loading ? '刷新中...' : '刷新'}
            </button>
          </div>
          {artifacts.length === 0 && <p className="text-stone-500 text-sm">暂无产物文件</p>}
          <div className="bg-ink-900 rounded border border-ink-700 overflow-hidden">
            {/* 剧本原文.txt always on top */}
            <div className="border-b border-ink-800">
              <div className="flex items-center justify-between p-3">
                <div className="flex items-center gap-2 min-w-0 flex-1">
                  <span className="text-stone-500 flex-shrink-0 text-xs">📄</span>
                  <span className="text-stone-100 text-sm font-medium">剧本原文.txt</span>
                  <span className="text-stone-500 text-xs">原始剧本</span>
                </div>
                <div className="flex gap-1.5 ml-3 flex-shrink-0">
                  <button onClick={async () => {
                    if (expandedRef.current['_script_']) {
                      setExpanded(prev => { const next = {...prev}; delete next['_script_']; return next; });
                      return;
                    }
                    setScriptLoading(true);
                    try {
                      const res = await api(`/pipelines/${pipelineId}/script`);
                      if (res.ok) {
                        const text = await res.text();
                        setScriptText(text);
                        setExpanded(prev => ({ ...prev, _script_: text }));
                      } else {
                        alert('无法加载剧本');
                      }
                    } catch (e) {
                      alert('加载失败: ' + e.message);
                    } finally { setScriptLoading(false); }
                  }} className="text-xs px-2.5 py-1 bg-ink-700 hover:bg-ink-600 rounded text-stone-200 transition-colors">
                    {expanded['_script_'] ? '收起' : '查看'}
                  </button>
                  <button onClick={async () => {
                    try {
                      const res = await api(`/pipelines/${pipelineId}/script`);
                      if (!res.ok) throw new Error('Download failed');
                      const blob = await res.blob();
                      const url = URL.createObjectURL(blob);
                      const a = document.createElement('a');
                      a.href = url;
                      a.download = '剧本原文.txt';
                      document.body.appendChild(a);
                      a.click();
                      document.body.removeChild(a);
                      URL.revokeObjectURL(url);
                    } catch (e) { console.error(e); }
                  }} className="text-xs px-2.5 py-1 bg-brass-500 hover:bg-brass-400 rounded text-ink-950 font-medium transition-colors">
                    下载
                  </button>
                </div>
              </div>
              {expanded['_script_'] && (
                <div className="bg-ink-950 p-4 border-t border-ink-700 relative">
                  <div className="absolute top-2 right-2 flex gap-2">
                    <button onClick={() => copyToClipboard(expanded['_script_'], '剧本原文.txt')} className="text-stone-400 hover:text-stone-200 transition-colors" title="复制">📋</button>
                    <button onClick={() => setExpanded(prev => { const next = {...prev}; delete next['_script_']; return next; })} className="text-stone-400 hover:text-stone-200 transition-colors">✕</button>
                  </div>
                  <h4 className="text-sm font-semibold text-stone-300 mb-2">剧本原文.txt</h4>
                  <pre className="text-xs text-stone-300 overflow-auto max-h-96 whitespace-pre-wrap">{expanded['_script_']}</pre>
                </div>
              )}
            </div>
            {rootFiles.map(f => (
              <FileRow key={f.name} file={f} level={0}
                pipelineId={pipelineId} expanded={expanded}
                onView={viewJson} onDownload={download} onCopy={copyToClipboard} onToggle={toggleExpand} />
            ))}
            {topDirs.map(d => (
              <DirNode key={d} name={d} node={tree[d]} level={0} path=""
                treeOpen={treeOpen} onToggleDir={toggleDir}
                expanded={expanded} onView={viewJson} onDownload={download} onCopy={copyToClipboard} onToggle={toggleExpand} />
            ))}
          </div>
        </div>
      );
    }

    function LogViewer({ pipelineId, isRunning }) {
      const [logs, setLogs] = useState('');
      const [loading, setLoading] = useState(false);
      const [autoScroll, setAutoScroll] = useState(true);
      const logContainerRef = useRef(null);

      const loadLogs = useCallback(async (userInitiated = false) => {
        if (userInitiated) setLoading(true);
        try {
          const res = await api(`/pipelines/${pipelineId}/logs`);
          if (res.ok) {
            const text = await res.text();
            setLogs(text);
          }
        } finally { if (userInitiated) setLoading(false); }
      }, [pipelineId]);

      useEffect(() => { loadLogs(); }, [loadLogs]);

      useEffect(() => {
        if (!isRunning) return;
        const t = setInterval(loadLogs, 1000);
        return () => clearInterval(t);
      }, [isRunning, loadLogs]);

      useEffect(() => {
        if (autoScroll && logContainerRef.current) {
          logContainerRef.current.scrollTop = logContainerRef.current.scrollHeight;
        }
      }, [logs, autoScroll]);

      const handleScroll = () => {
        if (!logContainerRef.current) return;
        const el = logContainerRef.current;
        const isAtBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 50;
        setAutoScroll(isAtBottom);
      };

      return (
        <div className="mt-10">
          <div className="flex items-center justify-between mb-4">
            <h3 className="font-heading text-lg font-semibold text-stone-100">运行日志</h3>
            <div className="flex items-center gap-3">
              <label className="flex items-center gap-1.5 text-xs text-stone-400 cursor-pointer">
                <input type="checkbox" checked={autoScroll} onChange={(e) => setAutoScroll(e.target.checked)} className="accent-brass-500" />
                自动滚动
              </label>
              <button onClick={() => loadLogs(true)} disabled={loading} className="nav-btn text-sm text-stone-400 hover:text-brass-400 transition-colors">
                {loading ? '刷新中...' : '刷新'}
              </button>
            </div>
          </div>
          <div
            ref={logContainerRef}
            onScroll={handleScroll}
            className="log-viewer bg-ink-950 border border-ink-700 rounded p-4 h-96 overflow-auto font-mono text-xs text-stone-300 whitespace-pre-wrap"
          >
            {logs || <span className="text-stone-500">暂无日志</span>}
          </div>
        </div>
      );
    }

    function StoryboardViewer({ pipelineId }) {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(false);
      const [expandedScenes, setExpandedScenes] = useState({});

      const load = useCallback(async () => {
        setLoading(true);
        try {
          const res = await api(`/pipelines/${pipelineId}/artifacts/storyboard.json`);
          if (res.ok) setData(await res.json());
        } catch (e) { /* ignore */ }
        finally { setLoading(false); }
      }, [pipelineId]);

      useEffect(() => { load(); }, [load]);

      const toggleScene = useCallback((sceneId) => {
        setExpandedScenes(prev => ({ ...prev, [sceneId]: !prev[sceneId] }));
      }, []);

      if (!data && loading) return <div className="mt-6 text-stone-500 text-sm">加载分镜中...</div>;
      if (!data) return null;

      const scenes = data.scenes || [];
      const characters = data.characters || [];
      const shots = data.shots || [];

      return (
        <div className="mt-10">
          <h3 className="font-heading text-lg font-semibold text-stone-100 mb-4">
            分镜概览
            <span className="text-stone-400 text-sm font-normal ml-2">
              {characters.length} 角色 · {scenes.length} 场景 · {shots.length} 镜头
            </span>
          </h3>
          <div className="space-y-3">
            {characters.length > 0 && (
              <div className="bg-ink-900 rounded border border-ink-700 p-4">
                <h4 className="text-sm font-semibold text-stone-300 mb-3">角色</h4>
                <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
                  {characters.map((c, idx) => (
                    <div key={c.ref_id + '_' + idx} className="flex flex-col items-center gap-2">
                      <img
                        src={`/pipelines/${pipelineId}/artifacts/characters/${encodeURIComponent(c.ref_id)}_front.jpg`}
                        alt={c.ref_id}
                        className="w-20 h-20 object-cover rounded-full bg-ink-700 ring-1 ring-ink-600"
                        onError={e => { e.target.style.display = 'none'; e.target.src = ''; }}
                      />
                      <span className="text-xs text-stone-400 truncate max-w-full">{c.ref_id}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
            {scenes.map((scene, si) => {
              const sceneShots = shots.filter(s => s.full_shot_id?.startsWith(scene.scene_id));
              const isExpanded = expandedScenes[scene.scene_id];
              return (
                <div key={scene.scene_id} className="bg-ink-900 rounded border border-ink-700 overflow-hidden">
                  <div
                    className="flex items-center justify-between p-3 cursor-pointer hover:bg-ink-800 transition-colors"
                    onClick={() => toggleScene(scene.scene_id)}
                  >
                    <div className="flex-1 min-w-0 flex items-center gap-3">
                      <img
                        src={`/pipelines/${pipelineId}/artifacts/scenes/${scene.scene_id}_detail.jpg`}
                        alt={scene.scene_id}
                        className="w-14 h-9 object-cover rounded flex-shrink-0 bg-ink-700"
                        onError={e => { e.target.style.display = 'none'; e.target.src = ''; }}
                      />
                      <div>
                        <span className="text-stone-100 text-sm font-medium">{scene.scene_id}</span>
                        <span className="text-stone-500 text-xs ml-2">{sceneShots.length} 镜</span>
                      </div>
                    </div>
                    <span className="text-stone-400 text-xs">{isExpanded ? '收起' : '展开'}</span>
                  </div>
                  {isExpanded && (
                    <div className="border-t border-ink-700">
                      {sceneShots.map((shot, i) => (
                        <div key={shot.full_shot_id} className="p-3 bg-ink-950/50 flex gap-3 border-b border-ink-700 last:border-b-0">
                          <img
                            src={`/pipelines/${pipelineId}/artifacts/shots/${shot.full_shot_id}/${shot.full_shot_id}_startframe.png`}
                            alt={shot.full_shot_id}
                            className="w-28 h-16 object-cover rounded flex-shrink-0 bg-ink-700"
                            onError={e => {
                              e.target.style.display = 'none';
                              e.target.src = '';
                              const ph = e.target.parentElement?.querySelector('.startframe-placeholder');
                              if (ph) ph.style.display = 'flex';
                            }}
                          />
                          <div className="w-28 h-16 startframe-placeholder hidden items-center justify-center rounded flex-shrink-0 bg-ink-700 text-stone-500 text-xs">
                            待生成
                          </div>
                          <div className="flex-1 min-w-0">
                            <div className="flex items-center gap-2 mb-1">
                              <span className="text-xs font-bold text-brass-400">{shot.full_shot_id}</span>
                              <span className="text-xs text-stone-400 bg-ink-700 px-1.5 py-0.5 rounded">{shot.transition_type || '-'}</span>
                              <span className="text-xs text-stone-400">{shot.duration_sec != null ? (Number.isInteger(shot.duration_sec) ? shot.duration_sec : shot.duration_sec.toFixed(1)) + '秒' : '-'}</span>
                            </div>
                            <div className="text-xs text-stone-500">
                              {`Scene ${si+1} 第${i+1}镜`}
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function PipelineDetail({ pipeline, onRefresh, onBack }) {
      const [actionLoading, setActionLoading] = useState(false);
      const [summary, setSummary] = useState(null);
      const [summaryLoading, setSummaryLoading] = useState(false);

      useEffect(() => {
        let cancelled = false;
        setSummary(null);
        setSummaryLoading(true);
        api(`/pipelines/${pipeline.pipeline_id}/summarize`)
          .then(res => res.ok ? res.json() : Promise.resolve(null))
          .then(data => {
            if (!cancelled && data) setSummary(data);
          })
          .catch(() => {})
          .finally(() => { if (!cancelled) setSummaryLoading(false); });
        return () => { cancelled = true; };
      }, [pipeline.pipeline_id]);

      const getCurrentStep = () => {
        if (pipeline.status === 'done') return 5;
        if (pipeline.status === 'running') return pipeline.step || 0;
        if (pipeline.status?.startsWith('step_')) {
          const n = parseInt(pipeline.status.split('_')[1]);
          return Math.max(0, n - 1);
        }
        return pipeline.step || 0;
      };
      const currentStep = getCurrentStep();
      const pid = pipeline.pipeline_id;

      const canRunStep = (n) => {
        if (actionLoading) return false;
        if (pipeline.status === 'done') return false;
        if (n <= currentStep) return true;
        return false;
      };

      const runStep = async (step) => {
        setActionLoading(true);
        try {
          await api(`/pipelines/${pid}/steps/${step}`, { method: 'POST' });
          setTimeout(onRefresh, 1000);
        } finally { setActionLoading(false); }
      };

      const runAll = async () => {
        setActionLoading(true);
        try {
          const startStep = currentStep === 5 ? 1 : currentStep + 1;
          for (let s = startStep; s <= 5; s++) {
            await api(`/pipelines/${pid}/steps/${s}`, { method: 'POST' });
            const startTime = Date.now();
            const timeout = 30 * 60 * 1000;
            while (true) {
              await new Promise(r => setTimeout(r, 3000));
              if (Date.now() - startTime > timeout) {
                alert(`步骤 ${s} 超时 (30分钟)，请检查后端状态`);
                break;
              }
              const res = await api(`/pipelines/${pid}`);
              if (!res.ok) break;
              const data = await res.json();
              const status = data.status;
              if (status === 'failed' || status === 'canceled') {
                alert(`步骤 ${s} 失败: ${data.error || status}`);
                break;
              }
              const currentStep = status?.startsWith('step_') ? parseInt(status.split('_')[1]) : (status === 'done' ? 5 : 0);
              if (currentStep > s || status === 'done') break;
            }
          }
          onRefresh();
        } finally { setActionLoading(false); }
      };

      const del = async () => {
        if (!confirm('确定删除此 pipeline 及其所有产物?')) return;
        try {
          const res = await api(`/pipelines/${pid}`, { method: 'DELETE' });
          if (!res.ok) { alert(`删除失败: HTTP ${res.status}`); return; }
          onBack();
        } catch (e) { alert(`删除失败: ${e.message}`); }
      };

      return (
        <div className="bg-ink-900 rounded-lg p-6 border border-ink-700">
          <div className="flex items-start justify-between mb-2">
            <div className="flex-1 min-w-0">
              <h2 className="font-heading text-xl font-semibold text-stone-100 truncate" title={pipeline.name}>{pipeline.name || 'Untitled Pipeline'}</h2>
              {summaryLoading && <p className="text-stone-400 text-xs mt-1">正在生成摘要...</p>}
              {summary && summary.summary && (
                <p className="text-stone-300 text-sm mt-1 leading-relaxed">{summary.summary}</p>
              )}
              <div className="flex items-center gap-3 mt-2">
                <StatusBadge status={pipeline.status} />
                <span className="text-stone-400 text-sm">步骤 {currentStep}/5</span>
                {pipeline.duration && <span className="text-stone-500 text-xs">运行时长: {pipeline.duration}</span>}
              </div>
            </div>
            <button onClick={del} className="text-xs px-2.5 py-1.5 bg-ink-700 hover:bg-ink-600 text-clay-400 rounded transition-colors ml-4">删除</button>
          </div>

          <StepProgress currentStep={currentStep} />

          {pipeline.error && (
            <div className="bg-clay-500/10 border border-clay-500/30 text-clay-400 p-3 rounded text-sm mb-6">
              {pipeline.error}
            </div>
          )}

          <div className="grid grid-cols-5 gap-2 mb-6">
            {[1,2,3,4,5].map(n => {
              const isActive = pipeline.status === 'running' && pipeline.step === n;
              const isDone = n <= currentStep || pipeline.status === 'done';
              return (
                <button
                  key={n}
                  onClick={() => runStep(n)}
                  disabled={!canRunStep(n)}
                  className={`step-btn py-3 px-2 rounded text-sm font-medium transition-all ${
                    isActive
                      ? 'bg-brass-500 text-ink-950 ring-1 ring-brass-400'
                      : isDone
                        ? 'bg-brass-500/15 text-brass-400 hover:bg-brass-500/25'
                        : 'bg-ink-800 text-stone-400'
                  } ${!canRunStep(n) ? 'opacity-40 cursor-not-allowed' : 'cursor-pointer'}`}
                >
                  <div className="font-bold">{n}</div>
                  <div className="text-xs opacity-80">{STEP_NAMES[n]}</div>
                </button>
              );
            })}
          </div>

          <div className="flex gap-3 mb-6">
            <button onClick={runAll} disabled={actionLoading || pipeline.status === 'done'} className="nav-btn px-4 py-2 bg-brass-500 hover:bg-brass-400 disabled:bg-ink-700 text-ink-950 rounded text-sm font-medium transition-all disabled:text-stone-400">
              运行全部步骤
            </button>
            <button onClick={onRefresh} disabled={actionLoading} className="nav-btn px-4 py-2 bg-ink-700 hover:bg-ink-600 text-stone-200 rounded text-sm transition-all">
              刷新状态
            </button>
          </div>

          <StoryboardViewer pipelineId={pid} />
          <LogViewer pipelineId={pid} isRunning={pipeline.status === 'running' || pipeline.status?.startsWith('step_')} />
          <ArtifactList pipelineId={pid} />

          <div className="mt-8 text-xs text-stone-500 leading-relaxed">
            创建时间: {new Date(pipeline.created_at).toLocaleString()}<br/>
            更新时间: {new Date(pipeline.updated_at).toLocaleString()}
          </div>
        </div>
      );
    }

    function CreatePipeline({ onCreated }) {
      const [scriptFile, setScriptFile] = useState(null);
      const [scriptText, setScriptText] = useState('');
      const [submitting, setSubmitting] = useState(false);
      const [error, setError] = useState('');
      const fileRef = useRef();

      const handleFile = (e) => {
        const f = e.target.files[0];
        if (f) {
          setScriptFile(f);
          const reader = new FileReader();
          reader.onload = (ev) => setScriptText(ev.target.result);
          reader.readAsText(f);
        }
      };

      const submit = async () => {
        setError('');
        if (!scriptFile && !scriptText.trim()) {
          setError('请上传剧本文件或输入剧本内容');
          return;
        }
        setSubmitting(true);
        try {
          const fd = new FormData();
          if (scriptFile) {
            fd.append('script', scriptFile, scriptFile.name || 'script.txt');
          } else {
            const blob = new Blob([scriptText], { type: 'text/plain' });
            fd.append('script', blob, 'script.txt');
          }
          const res = await fetch(`${API_BASE}/pipelines`, { method: 'POST', body: fd });
          if (!res.ok) { const txt = await res.text(); throw new Error(txt || `HTTP ${res.status}`); }
          const data = await res.json();
          onCreated(data.pipeline_id);
        } catch (e) { setError(e.message); }
        finally { setSubmitting(false); }
      };

      return (
        <div className="bg-ink-900 rounded-lg p-8 border border-ink-700">
          <h2 className="font-heading text-lg font-semibold text-stone-100 mb-6">创建新 Pipeline</h2>
          {error && <div className="bg-clay-500/10 border border-clay-500/30 text-clay-400 p-3 rounded text-sm mb-4">{error}</div>}
          <div className="space-y-5">
            <div>
              <label className="block text-sm text-stone-300 mb-1.5 font-medium">上传剧本文件</label>
              <input ref={fileRef} type="file" accept=".txt,.md" onChange={handleFile}
                className="block w-full text-sm text-stone-400 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-medium file:bg-ink-700 file:text-stone-200 hover:file:bg-ink-600 file:transition-colors file:cursor-pointer cursor-pointer" />
            </div>
            <div className="flex items-center gap-3 text-stone-500 text-sm">
              <span className="h-px flex-1 bg-ink-700" />
              <span>或</span>
              <span className="h-px flex-1 bg-ink-700" />
            </div>
            <div>
              <label className="block text-sm text-stone-300 mb-1.5 font-medium">剧本内容</label>
              <textarea
                value={scriptText}
                onChange={(e) => { setScriptText(e.target.value); setScriptFile(null); if(fileRef.current) fileRef.current.value = ''; }}
                rows={8}
                className="w-full bg-ink-950 border border-ink-700 rounded p-3 text-stone-200 text-sm focus:outline-none focus:border-brass-500/50 transition-colors placeholder:text-stone-500"
                placeholder="在此粘贴剧本内容..."
              />
            </div>
            <button onClick={submit} disabled={submitting}
              className="step-btn w-full py-2.5 bg-brass-500 hover:bg-brass-400 disabled:bg-ink-700 text-ink-950 rounded font-medium transition-all disabled:text-stone-400">
              {submitting ? '创建中...' : '创建 Pipeline'}
            </button>
          </div>
        </div>
      );
    }

    function PipelineList({ onSelect, onCreateNew }) {
      const [items, setItems] = useState([]);
      const [loading, setLoading] = useState(true);
      const [viewMode, setViewMode] = useState('grid');

      const load = useCallback(async () => {
        setLoading(true);
        try {
          const res = await api('/pipelines');
          if (res.ok) {
            const data = await res.json();
            setItems(data.pipelines || []);
          }
        } finally { setLoading(false); }
      }, []);

      useEffect(() => { load(); const t = setInterval(load, 5000); return () => clearInterval(t); }, []);

      const sorted = [...items].sort((a, b) => {
        const ta = new Date(a.created_at).getTime();
        const tb = new Date(b.created_at).getTime();
        return viewMode === 'list' ? ta - tb : tb - ta;
      });

      const formatDuration = (d) => d || '';

      if (viewMode === 'grid') {
        return (
          <div>
            <div className="flex items-center justify-between mb-4">
              <div />
              <button onClick={() => setViewMode('list')} className="nav-btn text-sm text-stone-400 hover:text-brass-400 transition-colors">列表视图</button>
            </div>
            {loading && items.length === 0 && <p className="text-stone-500">加载中...</p>}
            {items.length === 0 && !loading && (
              <div className="text-center py-20">
                <p className="text-stone-400 mb-4">暂无 Pipeline</p>
                <button onClick={onCreateNew} className="nav-btn px-4 py-2 bg-brass-500 hover:bg-brass-400 text-ink-950 rounded font-medium transition-all">创建 Pipeline</button>
              </div>
            )}
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
              {sorted.map(p => (
                <div key={p.pipeline_id} onClick={() => onSelect(p.pipeline_id)}
                  className="pipeline-card bg-ink-900 p-5 rounded-lg border border-ink-700 cursor-pointer hover:border-brass-500/30 transition-all">
                  <div className="flex items-center justify-between mb-2">
                    <span className="text-stone-100 text-sm font-medium truncate" title={p.name}>{p.name || p.pipeline_id.slice(-8)}</span>
                    <StatusBadge status={p.status} />
                  </div>
                  <div className="text-stone-400 text-xs">步骤 {p.step}/5</div>
                  <div className="mt-3 w-full bg-ink-700 rounded-full h-1 overflow-hidden">
                    <div className="bg-brass-500 h-full rounded-full transition-all duration-500" style={{ width: `${(p.step / 5) * 100}%` }} />
                  </div>
                  <div className="mt-3 text-xs text-stone-500">{new Date(p.updated_at).toLocaleString()}</div>
                  {p.duration && <div className="mt-0.5 text-xs text-stone-500">运行时长: {formatDuration(p.duration)}</div>}
                </div>
              ))}
            </div>
          </div>
        );
      }

      return (
        <div>
          <div className="flex items-center justify-between mb-4">
            <div />
            <button onClick={() => setViewMode('grid')} className="nav-btn text-sm text-stone-400 hover:text-brass-400 transition-colors">卡片视图</button>
          </div>
          {loading && items.length === 0 && <p className="text-stone-500">加载中...</p>}
          {items.length === 0 && !loading && (
            <div className="text-center py-20">
              <p className="text-stone-400 mb-4">暂无 Pipeline</p>
              <button onClick={onCreateNew} className="nav-btn px-4 py-2 bg-brass-500 hover:bg-brass-400 text-ink-950 rounded font-medium transition-all">创建 Pipeline</button>
            </div>
          )}
          <div className="bg-ink-900 rounded-lg border border-ink-700 overflow-hidden">
            <div className="grid grid-cols-12 gap-4 p-3 bg-ink-800 text-xs text-stone-300 font-semibold">
              <div className="col-span-4">名称</div>
              <div className="col-span-2">状态</div>
              <div className="col-span-1">步骤</div>
              <div className="col-span-3">创建时间</div>
              <div className="col-span-2">运行时长</div>
            </div>
            {sorted.map(p => (
              <div key={p.pipeline_id} onClick={() => onSelect(p.pipeline_id)}
                className="grid grid-cols-12 gap-4 p-3 border-t border-ink-700 cursor-pointer hover:bg-ink-800/50 transition-colors">
                <div className="col-span-4 text-stone-100 text-sm font-medium truncate" title={p.name}>{p.name || p.pipeline_id.slice(-8)}</div>
                <div className="col-span-2"><StatusBadge status={p.status} /></div>
                <div className="col-span-1 text-stone-400 text-xs">步骤 {p.step}/5</div>
                <div className="col-span-3 text-stone-400 text-xs">{new Date(p.created_at).toLocaleString()}</div>
                <div className="col-span-2 text-stone-400 text-xs">{formatDuration(p.duration) || '-'}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function App() {
      const [pipelines, setPipelines] = useState([]);
      const [selected, setSelected] = useState(null);
      const [health, setHealth] = useState(null);
      const [currentView, setCurrentView] = useState('list');
      const [pipelineId, setPipelineId] = useState(null);
      const pollRef = useRef(null);

      const getHashView = () => {
        const hash = window.location.hash.replace('#', '');
        if (hash.startsWith('/pipelines/')) return { view: 'detail', id: hash.split('/')[2] };
        if (hash === '/create') return { view: 'create', id: null };
        return { view: 'list', id: null };
      };

      const navigateTo = (view, id = null) => {
        if (view === 'detail' && id) { window.location.hash = `#/pipelines/${id}`; }
        else if (view === 'create') { window.location.hash = '#/create'; }
        else { window.location.hash = '#'; }
      };

      const refreshSelected = useCallback(async () => {
        if (!pipelineId) return;
        try {
          const res = await api(`/pipelines/${pipelineId}`);
          if (res.ok) { const data = await res.json(); setSelected(data); }
        } catch (e) { console.error(e); }
      }, [pipelineId]);

      useEffect(() => {
        const onHashChange = () => {
          const { view: v, id } = getHashView();
          if (v === 'detail' && id) {
            api(`/pipelines/${id}`).then(res => {
              if (res.ok) {
                res.json().then(data => { setSelected(data); setCurrentView('detail'); setPipelineId(id); });
              } else { navigateTo('list'); }
            });
          } else if (v === 'create') { setCurrentView('create'); setPipelineId(null); setSelected(null); }
          else { setCurrentView('list'); setPipelineId(null); setSelected(null); }
        };
        window.addEventListener('hashchange', onHashChange);
        onHashChange();
        return () => window.removeEventListener('hashchange', onHashChange);
      }, []);

      useEffect(() => {
        if (currentView === 'detail' && selected) {
          const shouldPoll = selected.status === 'running' || selected.status?.startsWith('step_');
          if (shouldPoll) {
            pollRef.current = setInterval(refreshSelected, 3000);
          }
        }
        return () => { if (pollRef.current) { clearInterval(pollRef.current); pollRef.current = null; } };
      }, [currentView, selected, refreshSelected]);

      const selectPipeline = async (id) => { navigateTo('detail', id); };

      useEffect(() => {
        (async () => {
          try { const res = await api('/health'); setHealth(res.ok); }
          catch (e) { setHealth(false); }
        })();
      }, []);

      return (
        <div className="min-h-screen flex flex-col">
          <header className="bg-ink-900 border-b border-ink-700 px-6 py-4 flex items-center justify-between">
            <button onClick={() => navigateTo('list')} className="flex items-center gap-3 hover:opacity-80 transition-opacity">
              <div className="w-9 h-9 bg-brass-500 rounded flex items-center justify-center text-ink-950 font-heading font-bold text-lg">F</div>
              <div>
                <h1 className="font-heading text-lg font-semibold text-stone-100 leading-tight">Film Pipeline Studio</h1>
                <p className="text-xs text-stone-500 leading-tight">AI 剧本到电影</p>
              </div>
            </button>
            <div className="flex items-center gap-4">
              <div className="flex items-center gap-2">
                <div className={`w-2 h-2 rounded-full ${health ? 'bg-leaf-400' : 'bg-clay-500'}`} />
                <span className="text-sm text-stone-400">{health ? '在线' : '离线'}</span>
              </div>
              <button onClick={() => navigateTo('create')}
                className="nav-btn text-sm px-3 py-1.5 bg-brass-500 hover:bg-brass-400 text-ink-950 rounded font-medium transition-all">
                新建 Pipeline
              </button>
            </div>
          </header>

          <main className="flex-1 p-6 overflow-auto">
            {currentView === 'create' && (
              <div className="max-w-xl mx-auto">
                <button onClick={() => navigateTo('list')} className="nav-btn text-sm text-stone-400 hover:text-brass-400 mb-4 transition-colors">← 返回列表</button>
                <CreatePipeline onCreated={(id) => { selectPipeline(id); }} />
              </div>
            )}

            {currentView === 'list' && (
              <div>
                <div className="flex items-center justify-between mb-6">
                  <h2 className="font-heading text-lg font-semibold text-stone-100">Pipeline 列表</h2>
                </div>
                <PipelineList onSelect={selectPipeline} onCreateNew={() => navigateTo('create')} />
              </div>
            )}

            {currentView === 'detail' && selected && (
              <div className="max-w-4xl mx-auto">
                <button onClick={() => navigateTo('list')} className="nav-btn text-sm text-stone-400 hover:text-brass-400 mb-4 transition-colors">← 返回列表</button>
                <PipelineDetail pipeline={selected} onRefresh={refreshSelected} onBack={() => navigateTo('list')} />
              </div>
            )}
          </main>

          <footer className="bg-ink-900 border-t border-ink-700 px-6 py-4 text-center text-xs text-stone-500">
            Film Pipeline Studio — AI Screenplay to Film Pipeline
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
