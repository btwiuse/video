<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' fill='none'/></svg>">
  <title>Film Pipeline Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        colors: {
          transparent: 'transparent',
          current: 'currentColor',
          ink: {
            950: '#0d0c0b',
            900: '#1a1816',
            800: '#252220',
            700: '#34302d',
            600: '#4a4440',
          },
          brass: {
            400: '#dbb95d',
            500: '#c9a84c',
            600: '#b8963e',
          },
          stone: {
            100: '#f0ede8',
            200: '#e0dcd5',
            300: '#c4bfb7',
            400: '#a09890',
            500: '#7a736b',
          },
          leaf: {
            400: '#6aa07a',
            500: '#5a8a6a',
            600: '#4a7359',
          },
          clay: {
            400: '#b86a62',
            500: '#a8524a',
            600: '#8a423c',
          },
        },
        fontFamily: {
          heading: ['"Playfair Display"', 'Georgia', 'serif'],
          sans: ['"DM Sans"', 'system-ui', 'sans-serif'],
          mono: ['"JetBrains Mono"', 'SF Mono', 'monospace'],
        },
        extend: {
          keyframes: {
            'pulse-brass': {
              '0%, 100%': { boxShadow: '0 0 4px rgba(201,168,76,0.3)' },
              '50%': { boxShadow: '0 0 16px rgba(201,168,76,0.6)' },
            },
            'shimmer': {
              '0%': { backgroundPosition: '-200% 0' },
              '100%': { backgroundPosition: '200% 0' },
            },
            'slide-up': {
              '0%': { opacity: '0', transform: 'translateY(8px) scale(0.96)' },
              '100%': { opacity: '1', transform: 'translateY(0) scale(1)' },
            },
            'fade-out': {
              '0%': { opacity: '1' },
              '100%': { opacity: '0' },
            },
          },
          animation: {
            'pulse-brass': 'pulse-brass 2s ease-in-out infinite',
            'shimmer': 'shimmer 1.5s ease-in-out infinite',
            'slide-up': 'slide-up 0.25s ease-out',
            'fade-out': 'fade-out 0.2s ease-in forwards',
          },
        },
      },
    }
  </script>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="/js/utils.jsx"></script>
  <script type="text/babel" src="/js/components/StepTabs.jsx"></script>
  <script type="text/babel" src="/js/components/LogViewer.jsx"></script>
  <script type="text/babel" src="/js/components/ArtifactList.jsx"></script>
  <script type="text/babel" src="/js/components/StoryboardViewer.jsx"></script>
  <script type="text/babel" src="/js/components/StepView.jsx"></script>
  <script type="text/babel" src="/js/components/PipelineDetail.jsx"></script>
  <script type="text/babel" src="/js/components/CreatePipeline.jsx"></script>
  <script type="text/babel" src="/js/components/PipelineList.jsx"></script>
  <script type="text/babel" src="/js/components/App.jsx"></script>
  <script type="text/babel" src="/js/main.jsx"></script>
</body>
</html>
