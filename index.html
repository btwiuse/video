<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' fill='none'/></svg>">
  <title>Film Pipeline Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    .markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4 { font-weight: 600; margin-top: 1em; margin-bottom: 0.25em; color: #e4dcd3; }
    .markdown-body h1 { font-size: 1.05rem; }
    .markdown-body h2, .markdown-body h3, .markdown-body h4 { font-size: 0.95rem; }
    .markdown-body p { margin: 0.25em 0; line-height: 1.6; word-wrap: break-word; overflow-wrap: break-word; }
    .markdown-body ul, .markdown-body ol { padding-left: 1.5em; margin: 0.25em 0; }
    .markdown-body li { margin: 0.15em 0; word-wrap: break-word; overflow-wrap: break-word; }
    .markdown-body pre { background: #0a0a0f; padding: 0.75rem; border-radius: 0.375rem; margin: 0.5em 0; overflow-x: auto; border: 1px solid #2a2a35; }
    .markdown-body code { font-size: 0.8rem; color: #a8a29e; word-wrap: break-word; overflow-wrap: break-word; white-space: pre-wrap; }
    .markdown-body strong { color: #e4dcd3; }
.markdown-body table { border-collapse: collapse; width: 100%; margin: 0.5em 0; font-size: 0.8rem; }
.markdown-body th, .markdown-body td { border: 1px solid #2a2a35; padding: 0.4em 0.6em; text-align: left; vertical-align: top; word-wrap: break-word; overflow-wrap: break-word; }
.markdown-body th { background: #1a1a25; color: #a8a29e; font-weight: 600; }
.markdown-body td { background: #0f0f18; color: #d4ccc5; }
.markdown-body tr:nth-child(even) td { background: #0a0a14; }
  </style>
  <script>
    tailwind.config = {
      theme: {
        colors: {
          transparent: 'transparent',
          current: 'currentColor',
          ink: {
            950: '#0d0c0b',
            900: '#1a1816',
            800: '#252220',
            700: '#34302d',
            600: '#4a4440',
          },
          brass: {
            400: '#dbb95d',
            500: '#c9a84c',
            600: '#b8963e',
          },
          stone: {
            100: '#f0ede8',
            200: '#e0dcd5',
            300: '#c4bfb7',
            400: '#a09890',
            500: '#7a736b',
          },
          leaf: {
            400: '#6aa07a',
            500: '#5a8a6a',
            600: '#4a7359',
          },
          clay: {
            400: '#b86a62',
            500: '#a8524a',
            600: '#8a423c',
          },
        },
        fontFamily: {
          heading: ['"Playfair Display"', 'Georgia', 'serif'],
          sans: ['"DM Sans"', 'system-ui', 'sans-serif'],
          mono: ['"JetBrains Mono"', 'SF Mono', 'monospace'],
        },
        extend: {
          keyframes: {
            'pulse-brass': {
              '0%, 100%': { boxShadow: '0 0 4px rgba(201,168,76,0.3)' },
              '50%': { boxShadow: '0 0 16px rgba(201,168,76,0.6)' },
            },
            'shimmer': {
              '0%': { backgroundPosition: '-200% 0' },
              '100%': { backgroundPosition: '200% 0' },
            },
          },
          animation: {
            'pulse-brass': 'pulse-brass 2s ease-in-out infinite',
            'shimmer': 'shimmer 1.5s ease-in-out infinite',
            'slide-up': 'slide-up 0.25s ease-out',
            'fade-out': 'fade-out 0.2s ease-in forwards',
          },
        },
      },
    }
  </script>
  <style>
    body {
      background: #0d0c0b;
      color: #f0ede8;
      font-family: 'DM Sans', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    ::selection { background: rgba(201,168,76,0.3); color: #f0ede8; }
    .pipeline-card { transition: all 0.2s ease-out; }
    .pipeline-card:hover { transform: translateY(-3px); }
    .step-btn { transition: all 0.15s ease-out; }
    .step-btn:active { transform: scale(0.96); }
    .nav-btn { transition: all 0.15s ease-out; }
    .nav-btn:hover { transform: translateY(-1px); }
    .log-viewer::-webkit-scrollbar { width: 6px; }
    .log-viewer::-webkit-scrollbar-track { background: #1a1816; }
    .log-viewer::-webkit-scrollbar-thumb { background: #34302d; border-radius: 3px; }
    .shimmer-bg {
      background: linear-gradient(90deg, #1a1816 25%, #252220 50%, #1a1816 75%);
      background-size: 200% 100%;
    }
    @keyframes slide-up {
      from { opacity: 0; transform: translateY(8px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes fade-out {
      from { opacity: 1; }
      to { opacity: 0; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, ::before, ::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
      .pipeline-card:hover { transform: none; }
      .step-btn:active { transform: none; }
      .nav-btn:hover { transform: none; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    const { useState, useEffect, useRef, useCallback } = React;

    const API_BASE = window.location.origin;
    const STEP_NAMES = ["", "分镜生成", "视觉素材", "视频生成", "音频生成", "后期合成"];

    // Sonner-style toast
    const __toasts = [];
    let __toastId = 0;
    const __toastListeners = new Set();
    function toast(message, options = {}) {
      const id = ++__toastId;
      __toasts.push({ id, message, ...options });
      __toastListeners.forEach(fn => fn([...__toasts]));
      setTimeout(() => {
        const idx = __toasts.findIndex(t => t.id === id);
        if (idx !== -1) { __toasts.splice(idx, 1); __toastListeners.forEach(fn => fn([...__toasts])); }
      }, options.duration || 3000);
      return id;
    }
    toast.error = (msg) => toast(msg, { type: 'error' });
    function Toaster() {
      const [items, setItems] = useState([]);
      useEffect(() => {
        __toastListeners.add(setItems);
        setItems([...__toasts]);
        return () => __toastListeners.delete(setItems);
      }, []);
      return ReactDOM.createPortal(
        <div className="fixed bottom-4 right-4 z-[9999] flex flex-col gap-2 min-w-[280px] max-w-[380px] pointer-events-none">
          {items.map(t => (
            <div key={t.id} className={`pointer-events-auto px-4 py-3 rounded-lg shadow-2xl text-sm font-medium animate-slide-up ${t.type === 'error' ? 'bg-clay-500/90 text-white' : 'bg-ink-800/95 text-stone-100 border border-ink-600/50 backdrop-blur-sm'}`}>
              {t.message}
            </div>
          ))}
        </div>,
        document.body
      );
    }

    const fileCategory = (name) => {
      const ext = name.split('.').pop()?.toLowerCase();
      if (['png','jpg','jpeg','gif','webp'].includes(ext)) return 'image';
      if (['mp4','webm','mov'].includes(ext)) return 'video';
      if (['wav','mp3','m4a','flac'].includes(ext)) return 'audio';
      return 'text';
    };

    function api(url, opts = {}) {
      const isGet = !opts.method || opts.method === 'GET';
      const headers = isGet ? {} : { 'Content-Type': 'application/json', ...(opts.headers || {}) };
      return fetch(`${API_BASE}${url}`, { ...opts, headers });
    }
    function artifactUrl(pipelineId, name, cb) {
      const enc = name.split('/').map(s => encodeURIComponent(s)).join('/');
      return `/pipelines/${pipelineId}/artifacts/${enc}${cb ? '?ck=' + cb : ''}`;
    }

    function StatusBadge({ status }) {
      const styles = {
        pending:     'bg-ink-700 text-stone-400',
        running:     'bg-brass-500/20 text-brass-400 animate-pulse-brass',
        done:        'bg-leaf-500/20 text-leaf-400',
        failed:      'bg-clay-500/20 text-clay-400',
        canceled:    'bg-ink-700 text-stone-400',
        step_1:      'bg-brass-500/10 text-brass-400',
        step_2:      'bg-brass-500/10 text-brass-400',
        step_3:      'bg-brass-500/10 text-brass-400',
        step_4:      'bg-brass-500/10 text-brass-400',
        step_5:      'bg-brass-500/10 text-brass-400',
      };
      const labels = {
        pending: '待处理', running: '运行中', done: '完成', failed: '失败', canceled: '已取消',
        step_1: '步骤 1', step_2: '步骤 2', step_3: '步骤 3', step_4: '步骤 4', step_5: '步骤 5',
      };
      return (
        <span className={`inline-flex items-center gap-1.5 px-2.5 py-1 rounded text-xs font-medium ${styles[status] || 'bg-ink-700 text-stone-400'}`}>
          {status === 'running' && <span className="w-1.5 h-1.5 rounded-full bg-brass-400" />}
          {labels[status] || status}
        </span>
      );
    }

    function StepTabs({ currentStep, pipelineStatus, activeStep, onNavigate }) {
      const isDone = pipelineStatus === 'done';
      const current = isDone ? 5 : currentStep;
      return (
        <div className="flex gap-2 mb-6">
          {[1,2,3,4,5].map(n => {
            const completed = n <= current;
            const isNext = n === current + 1;
            const available = completed || isNext;
            const isActive = n === activeStep;
            return (
              <button
                key={n}
                onClick={() => { if (available) onNavigate(n); }}
                disabled={!available}
                className={`step-btn flex-1 py-3 px-2 rounded text-sm font-medium transition-all ${
                  isActive
                    ? 'bg-brass-500 text-ink-950 ring-1 ring-brass-400 shadow-lg shadow-brass-500/10'
                    : completed
                      ? 'bg-brass-500/15 text-brass-400 hover:bg-brass-500/25'
                      : isNext
                        ? 'bg-ink-800 text-stone-300 ring-1 ring-ink-600 hover:bg-ink-700'
                        : 'bg-ink-800/60 text-stone-600 cursor-not-allowed'
                }`}
              >
                <div className="font-bold leading-tight">{completed ? '✓' : n}</div>
                <div className="text-xs opacity-80 mt-0.5">{STEP_NAMES[n]}</div>
              </button>
            );
          })}
        </div>
      );
    }

    function StepView({ step, pipeline, onRun, actionLoading, pipelineId, onCancel,
                        maxShotsPerScene, setMaxShotsPerScene, totalShots, setTotalShots, totalDuration, setTotalDuration }) {
      const getCS = () => {
        if (pipeline.status === 'done') return 5;
        if (pipeline.status === 'failed' || pipeline.status === 'canceled') return Math.max(0, (pipeline.step || 1) - 1);
        return pipeline.step || 0;
      };
      const currentStep = getCS();
      const isStepDone = step <= currentStep || pipeline.status === 'done';
      const isStepRunning = pipeline.status === 'running' && pipeline.step === step;
      const canGenerate = (step === currentStep + 1 || step <= currentStep) && !actionLoading;
      const [artifacts, setArtifacts] = useState([]);
      const [artLoading, setArtLoading] = useState(false);
      const [previews, setPreviews] = useState({});
      const [regenerating, setRegenerating] = useState({});
      const [cacheBust, setCacheBust] = useState({});
      const [lightbox, setLightbox] = useState(null);
      const [stepReloadKey, setStepReloadKey] = useState(0);
      const prevPipelineRef = useRef(pipeline);

      useEffect(() => {
        const prev = prevPipelineRef.current;
        prevPipelineRef.current = pipeline;
        if (prev && prev.status !== pipeline.status) {
          setStepReloadKey(k => k + 1);
        }
      }, [pipeline, pipeline.status]);

      useEffect(() => {
        if (!isStepDone && !isStepRunning) { setArtifacts([]); return; }
        let cancelled = false;
        let t;
        const fetchArtifacts = async () => {
          try {
            const res = await api(`/pipelines/${pipelineId}/artifacts`);
            if (res.ok && !cancelled) setArtifacts((await res.json()).files || []);
          } catch (e) { /* ignore */ }
        };
        fetchArtifacts();
        if (isStepRunning || (!isStepDone && pipeline.status !== 'done' && pipeline.status !== 'failed')) {
          t = setInterval(() => { if (!document.hidden) fetchArtifacts(); }, 15000);
        }
        return () => { cancelled = true; if (t) clearInterval(t); };
      }, [pipelineId, isStepDone, isStepRunning, pipeline.status]);

      const previewUrl = async (name) => {
        if (previews[name]) { setPreviews(p => { const n = {...p}; delete n[name]; return n; }); return; }
        try {
          const res = await api(`/pipelines/${pipelineId}/artifacts/${encodeURIComponent(name)}`);
          if (!res.ok) return;
          const blob = await res.blob();
          setPreviews(p => ({ ...p, [name]: URL.createObjectURL(blob) }));
        } catch (e) { /* ignore */ }
      };

      const charImages = artifacts.filter(f => f.name.startsWith('characters/') && /\.(jpg|jpeg|png|webp)$/i.test(f.name));
      const sceneImages = artifacts.filter(f => f.name.startsWith('scenes/') && /\.(jpg|jpeg|png|webp)$/i.test(f.name));
      const shotImages = artifacts.filter(f => f.name.startsWith('shots/') && /_startframe\.(jpg|jpeg|png|webp)$/i.test(f.name));
      const videoFiles = artifacts.filter(f => f.name.startsWith('shots/') && /\.(mp4|webm|mov)$/i.test(f.name));
      const audioFiles = artifacts.filter(f => (f.name.startsWith('audio/') || f.name.startsWith('sfx/') || f.name.startsWith('bgm/')) && /\.(wav|mp3|m4a|flac)$/i.test(f.name));
      const finalVideo = artifacts.find(f => f.name === 'final.mp4');

      return (
        <div className="bg-ink-800/30 border border-ink-700 rounded p-6 mb-6">
          <div className="flex items-center justify-between mb-6">
            <div>
              <h3 className="font-heading text-lg font-semibold text-stone-100">
                步骤 {step}: {STEP_NAMES[step]}
              </h3>
              <p className="text-xs text-stone-500 mt-1">
                {isStepDone ? '已完成' : isStepRunning ? '正在生成...' : canGenerate ? '准备就绪' : '前置步骤尚未完成'}
              </p>
            </div>
            <div className="flex items-center gap-2">
              {isStepRunning && (
                <button
                  onClick={() => onCancel && onCancel()}
                  className="px-4 py-2.5 rounded text-sm font-medium bg-clay-500/20 text-clay-400 hover:bg-clay-500/30 transition-all"
                >
                  停止
                </button>
              )}
              <button
                onClick={() => onRun(step)}
                disabled={!canGenerate || isStepRunning}
                className={`px-5 py-2.5 rounded text-sm font-medium transition-all ${
                  isStepRunning
                    ? 'bg-brass-500 text-ink-950 animate-pulse-brass'
                    : canGenerate
                      ? 'bg-brass-500 hover:bg-brass-400 text-ink-950 cursor-pointer'
                      : 'bg-ink-700 text-stone-500 cursor-not-allowed'
                }`}
              >
                {isStepRunning ? '⏳ 生成中...' : isStepDone ? '重新生成' : 'Generate'}
              </button>
            </div>
          </div>

          {step === 1 && canGenerate && !isStepRunning && (
            <div className="mb-6 p-4 bg-ink-900/50 rounded border border-ink-700 space-y-3">
              <p className="text-xs text-stone-400 font-medium">分镜参数</p>
              <div className="flex items-center gap-4">
                <label className="text-xs text-stone-400 w-28 flex-shrink-0">每场景最多镜头</label>
                <input type="range" min="1" max="20" value={maxShotsPerScene}
                  onChange={e => setMaxShotsPerScene(parseInt(e.target.value))}
                  className="flex-1 accent-brass-500 h-1.5" />
                <span className="text-xs text-stone-200 w-6 text-right">{maxShotsPerScene}</span>
              </div>
              <div className="flex items-center gap-4">
                <label className="text-xs text-stone-400 w-28 flex-shrink-0">总镜头数上限</label>
                <input type="range" min="1" max="60" value={totalShots}
                  onChange={e => setTotalShots(parseInt(e.target.value))}
                  className="flex-1 accent-brass-500 h-1.5" />
                <span className="text-xs text-stone-200 w-6 text-right">{totalShots}</span>
              </div>
              <div className="flex items-center gap-4">
                <label className="text-xs text-stone-400 w-28 flex-shrink-0">总时长（秒）</label>
                <input type="range" min="1" max="60" value={totalDuration}
                  onChange={e => setTotalDuration(parseInt(e.target.value))}
                  className="flex-1 accent-brass-500 h-1.5" />
                <span className="text-xs text-stone-200 w-6 text-right">{totalDuration}s</span>
              </div>
            </div>
          )}

          {step === 1 && (isStepDone || isStepRunning) && <StoryboardViewer pipelineId={pipelineId} poll={isStepRunning} reloadKey={stepReloadKey} />}

          {step === 2 && (isStepDone || isStepRunning) && (
            <div className="space-y-6">
              {charImages.length > 0 && (
                <div>
                  <h4 className="text-sm font-semibold text-stone-300 mb-3">角色肖像</h4>
                  <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
                    {charImages.map(f => {
                      const label = f.name.split('/')[1]?.replace(/\.(jpg|jpeg|png)$/, '');
                      const isRegen = regenerating['char_' + label];
                      const cb = cacheBust[f.name];
                      return (
                        <div key={f.name + (cb || '')} className="flex flex-col items-center gap-1.5 group relative">
                          <div className="relative w-full aspect-[3/4]">
                            <img
                              src={artifactUrl(pipelineId, f.name, cb)}
                              alt={f.name.split('/').pop()}
                              className="w-full h-full object-cover rounded bg-ink-700 cursor-pointer"
                              onError={e => { e.target.style.display = 'none'; }}
                              onClick={() => setLightbox(artifactUrl(pipelineId, f.name, cb))}
                            />
                            {isRegen && (
                              <div className="absolute inset-0 bg-ink-950/70 rounded flex items-center justify-center">
                                <div className="w-6 h-6 border-2 border-brass-400 border-t-transparent rounded-full animate-spin" />
                              </div>
                            )}
                          </div>
                          <span className="text-xs text-stone-500 truncate max-w-full">{f.name.split('/').pop()?.replace(/\.(jpg|jpeg|png)$/, '')}</span>
                          <button
                            onClick={async () => {
                              if (isRegen) return;
                              setRegenerating(r => ({ ...r, ['char_' + label]: true }));
                              try {
                                await api(`/pipelines/${pipelineId}/regenerate`, {
                                  method: 'POST',
                                  body: JSON.stringify({ character_images: [label] }),
                                });
                                setCacheBust(c => ({ ...c, [f.name]: Date.now() }));
                              } catch (e) { /* ignore */ }
                              setRegenerating(r => { const n = {...r}; delete n['char_' + label]; return n; });
                            }}
                            className="absolute top-1 right-1 w-7 h-7 rounded bg-ink-900/80 hover:bg-brass-500/80 text-stone-400 hover:text-ink-950 flex items-center justify-center text-xs opacity-0 group-hover:opacity-100 transition-all cursor-pointer disabled:opacity-0"
                            disabled={isRegen}
                            title="重新生成此角色"
                          >⟳</button>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
              {sceneImages.length > 0 && (
                <div>
                  <h4 className="text-sm font-semibold text-stone-300 mb-3">场景参考</h4>
                  <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
                    {sceneImages.map(f => {
                      const label = f.name.split('/')[1]?.replace(/\.(jpg|jpeg|png)$/, '');
                      const isRegen = regenerating['scene_' + label];
                      const cb = cacheBust[f.name];
                      return (
                        <div key={f.name + (cb || '')} className="group relative">
                          <div className="relative w-full aspect-video">
                            <img
                              src={artifactUrl(pipelineId, f.name, cb)}
                              alt={f.name.split('/').pop()}
                              className="w-full h-full object-cover rounded bg-ink-700 cursor-pointer"
                              onError={e => { e.target.style.display = 'none'; }}
                              onClick={() => setLightbox(artifactUrl(pipelineId, f.name, cb))}
                            />
                            {isRegen && (
                              <div className="absolute inset-0 bg-ink-950/70 rounded flex items-center justify-center">
                                <div className="w-6 h-6 border-2 border-brass-400 border-t-transparent rounded-full animate-spin" />
                              </div>
                            )}
                          </div>
                          <span className="text-xs text-stone-500 mt-1 block">{f.name.split('/').pop()?.replace(/\.(jpg|jpeg|png)$/, '')}</span>
                          <button
                            onClick={async () => {
                              if (isRegen) return;
                              setRegenerating(r => ({ ...r, ['scene_' + label]: true }));
                              try {
                                await api(`/pipelines/${pipelineId}/regenerate`, {
                                  method: 'POST',
                                  body: JSON.stringify({ scene_images: [label] }),
                                });
                                setCacheBust(c => ({ ...c, [f.name]: Date.now() }));
                              } catch (e) { /* ignore */ }
                              setRegenerating(r => { const n = {...r}; delete n['scene_' + label]; return n; });
                            }}
                            className="absolute top-1 right-1 w-7 h-7 rounded bg-ink-900/80 hover:bg-brass-500/80 text-stone-400 hover:text-ink-950 flex items-center justify-center text-xs opacity-0 group-hover:opacity-100 transition-all cursor-pointer disabled:opacity-0"
                            disabled={isRegen}
                            title="重新生成此场景"
                          >⟳</button>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
              {charImages.length === 0 && sceneImages.length === 0 && <p className="text-stone-500 text-sm">暂无视觉素材</p>}
              {shotImages.length > 0 && (
                <div>
                  <h4 className="text-sm font-semibold text-stone-300 mb-3">镜头起始帧</h4>
                  <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
                    {shotImages.map(f => {
                      const shotId = f.name.split('/')[1];
                      const isRegen = regenerating['shot_' + shotId];
                      const cb = cacheBust[f.name];
                      return (
                        <div key={f.name + (cb || '')} className="flex flex-col items-center gap-1.5 group relative">
                          <div className="relative w-full aspect-video">
                            <img
                              src={artifactUrl(pipelineId, f.name, cb)}
                              alt={f.name.split('/').pop()}
                              className="w-full h-full object-cover rounded bg-ink-700 cursor-pointer"
                              onError={e => { e.target.style.display = 'none'; }}

                            {isRegen && (
                              <div className="absolute inset-0 bg-ink-950/70 rounded flex items-center justify-center">

                                  method: 'POST',
                                  body: JSON.stringify({ shots: [shotId] }),

                                setCacheBust(c => ({ ...c, [f.name]: Date.now() }));
                              } catch (e) { /* ignore */ }
                              setRegenerating(r => { const n = {...r}; delete n['shot_' + shotId]; return n; });

                            className="absolute top-1 right-1 w-7 h-7 rounded bg-ink-900/80 hover:bg-brass-500/80 text-stone-400 hover:text-ink-950 flex items-center justify-center text-xs opacity-0 group-hover:opacity-100 transition-all cursor-pointer disabled:opacity-0"
                            disabled={isRegen}
                            title="重新生成此镜头"
                          >⟳</button>
                        </div>
                      );
                    })}

                </div>
              )}
            </div>

          {step === 3 && (isStepDone || isStepRunning) && (
            <div>
              {videoFiles.length > 0 ? (
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  {videoFiles.map(f => (
                    <div key={f.name}>
                      <p className="text-xs text-stone-400 mb-1.5 truncate">{f.name.split('/').slice(0,2).join('/')}</p>
                      <video
                        src={`/pipelines/${pipelineId}/artifacts/${encodeURIComponent(f.name)}`}

                      <span className="text-stone-200 text-sm flex-1 min-w-0 truncate">{f.name}</span>
                      <audio
                        src={`/pipelines/${pipelineId}/artifacts/${encodeURIComponent(f.name)}`}
                        controls
                        className="h-8 max-w-[200px]"

                </div>

                <p className="text-stone-500 text-sm">暂无音频文件</p>

          {step === 5 && (isStepDone || isStepRunning) && (
            <div>
              {finalVideo ? (
                <div>
                  <video
                    src={`/pipelines/${pipelineId}/artifacts/final.mp4`}
                    controls
                    className="w-full rounded bg-ink-950 max-h-[500px]"
                  />
                  <p className="text-xs text-stone-500 mt-2">{(finalVideo.size / 1024 / 1024).toFixed(1)} MB</p>

              ) : (
                <p className="text-stone-500 text-sm">暂无最终影片</p>

          {!isStepDone && !isStepRunning && (
            <div className="text-center py-8 text-stone-500 text-sm border border-dashed border-ink-700 rounded">

              onClick={() => setLightbox(null)}

              ref={el => { if (el) el.focus(); }}

              <button
                onClick={() => setLightbox(null)}
                className="absolute top-4 right-4 w-8 h-8 rounded-full bg-ink-900/80 hover:bg-clay-500/80 text-stone-400 hover:text-white flex items-center justify-center text-sm transition-all cursor-pointer z-10"
              >✕</button>
              <img
                src={lightbox}
                className="max-w-full max-h-full object-contain rounded cursor-default"
                onClick={e => e.stopPropagation()}
                alt="放大预览"
              />
            </div>
          )}
        </div>
      );
    }

    function FileRow({ file, level, pipelineId, expanded, onView, onDownload, onCopy, onToggle }) {
        const paddingLeft = 16 + level * 20;
        const isOpen = !!expanded[file.name];
        return (
          <div className="border-b border-ink-800 last:border-b-0">
            <div
              className="flex items-center justify-between py-1.5 pr-3 cursor-pointer hover:bg-ink-800/30 transition-colors select-none"
              style={{ paddingLeft }}
              onClick={() => onView(file.name)}
            >
              <div className="flex items-center gap-2 min-w-0 flex-1">
                <span className="text-stone-500 flex-shrink-0 text-xs w-3 text-center transition-transform" style={{ transform: isOpen ? 'rotate(90deg)' : 'none' }}>▶</span>
                <span className="text-stone-500 flex-shrink-0 text-xs">📄</span>
                <span className="text-stone-100 text-sm truncate">{file.name.split('/').pop()}</span>
                <span className="text-stone-500 text-xs flex-shrink-0">{(file.size / 1024).toFixed(1)} KB</span>

              <div className="bg-ink-950 p-3 border-t border-ink-700 relative" style={{ paddingLeft: paddingLeft + 8 }}>
                <div className="absolute top-2 right-2 flex gap-2">
                  <button onClick={() => onDownload(file.name)} className="text-stone-400 hover:text-stone-200 transition-colors text-xs" title="下载">⬇</button>
                  {(fileCategory(file.name) === 'text') && <button onClick={() => onCopy(expanded[file.name], file.name)} className="text-stone-400 hover:text-stone-200 transition-colors text-xs" title="复制">📋</button>}
                  <button onClick={() => onToggle(file.name)} className="text-stone-400 hover:text-stone-200 transition-colors text-xs">✕</button>
                </div>
                <h4 className="text-xs font-semibold text-stone-400 mb-1.5">{file.name}</h4>
                {fileCategory(file.name) === 'image' ? (
                  <img src={expanded[file.name]} alt={file.name} className="max-w-full rounded" />
                ) : fileCategory(file.name) === 'video' ? (
                  <video src={expanded[file.name]} controls className="max-w-full rounded" />
                ) : fileCategory(file.name) === 'audio' ? (
                  <audio src={expanded[file.name]} controls className="w-full" />
                ) : (
                  <pre className="text-xs text-stone-300 overflow-auto max-h-96 whitespace-pre-wrap">{expanded[file.name]}</pre>
                )}
              </div>
            )}
          </div>
        );
    }

    function DirNode({ name, node, level, path, pipelineId, treeOpen, onToggleDir, expanded, onView, onDownload, onCopy, onToggle }) {
        const fullPath = path ? `${path}/${name}` : name;
        const isOpen = treeOpen[fullPath] !== undefined ? treeOpen[fullPath] : level < 2;
        const paddingLeft = 16 + level * 20;

        const childDirs = Object.keys(node.__children || {}).sort();
        const childFiles = (node.__files || []).sort((a, b) => a.name.localeCompare(b.name));

        return (
          <div>
            <div
              className="flex items-center gap-1.5 py-1.5 pr-3 cursor-pointer hover:bg-ink-800/50 transition-colors select-none"
              style={{ paddingLeft }}
              onClick={() => onToggleDir(fullPath)}
            >
              <span className="text-stone-400 flex-shrink-0 text-xs w-3 text-center transition-transform" style={{ transform: isOpen ? 'rotate(90deg)' : 'none' }}>
                ▶
              </span>
              <span className="text-stone-500 flex-shrink-0 text-xs">📁</span>
              <span className="text-stone-200 text-sm font-medium">{name}</span>
              <span className="text-stone-600 text-xs ml-1">
                {childDirs.length + childFiles.length}项
              </span>
            </div>
            {isOpen && (
              <div>
                {childDirs.map(d => (
                  <DirNode key={d} name={d} node={node.__children[d]} level={level + 1} path={fullPath}
                    treeOpen={treeOpen} onToggleDir={onToggleDir}
                    expanded={expanded} onView={onView} onDownload={onDownload} onCopy={onCopy} onToggle={onToggle} pipelineId={pipelineId} />
                ))}
                {childFiles.map(f => (
                  <FileRow key={f.name} file={f} level={level + 1}
                    pipelineId={pipelineId} expanded={expanded}
                    onView={onView} onDownload={onDownload} onCopy={onCopy} onToggle={onToggle} />
                ))}
              </div>
            )}
          </div>
        );
    }

    function ArtifactList({ pipelineId }) {
      const [artifacts, setArtifacts] = useState([]);
      const [loading, setLoading] = useState(false);
      const [expanded, setExpanded] = useState({});
      const [treeOpen, setTreeOpen] = useState({});
      const expandedRef = useRef({});
      useEffect(() => { expandedRef.current = expanded; }, [expanded]);

      const load = useCallback(async () => {
        setLoading(true);
        try {
          const res = await api(`/pipelines/${pipelineId}/artifacts`);
          if (res.ok) {
            const data = await res.json();
            setArtifacts(data.files || []);
          }
        } finally { setLoading(false); }
      }, [pipelineId]);

      useEffect(() => {
        load();
        const t = setInterval(() => { if (!document.hidden) load(); }, 10000);
        return () => clearInterval(t);
      }, [load]);

      const download = useCallback(async (name) => {
        try {
          const res = await api(`/pipelines/${pipelineId}/artifacts/${encodeURIComponent(name)}`);
          if (!res.ok) throw new Error('Download failed');
          const blob = await res.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = name;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
        } catch (e) { console.error(e); }
      }, [pipelineId]);

      const viewJson = useCallback(async (name) => {
        if (expandedRef.current[name]) {
          setExpanded(prev => { const next = { ...prev }; delete next[name]; return next; });
          return;
        }
        const cat = fileCategory(name);
        if (cat === 'text') {
          try {
            const res = await api(`/pipelines/${pipelineId}/artifacts/${encodeURIComponent(name)}`);
            if (!res.ok) throw new Error('Fetch failed');
            const text = await res.text();
            const MAX_PREVIEW = 50000;
            if (text.length > MAX_PREVIEW) {
              setExpanded(prev => ({ ...prev, [name]: text.substring(0, MAX_PREVIEW) + '\n\n... (文件过大，仅显示前 50KB，请下载查看完整内容)' }));
            } else {
              setExpanded(prev => ({ ...prev, [name]: text }));
            }
          } catch (e) { console.error(e); }
        } else {
          try {
            const res = await api(`/pipelines/${pipelineId}/artifacts/${encodeURIComponent(name)}`);
            if (!res.ok) throw new Error('Fetch failed');
            const blob = await res.blob();
            const url = URL.createObjectURL(blob);
            setExpanded(prev => ({ ...prev, [name]: url }));
          } catch (e) { console.error(e); }
        }
      }, [pipelineId]);

      const toggleExpand = useCallback((name) => {
        setExpanded(prev => { const next = { ...prev }; if (next[name]) delete next[name]; return next; });
      }, []);

      const copyToClipboard = useCallback((text, name) => {
        navigator.clipboard.writeText(text).then(() => toast('已复制: ' + name)).catch(() => toast.error('复制失败'));
      }, []);

      function buildTree(files) {
        const root = {};
        for (const f of files) {
          const parts = f.name.split('/');
          let node = root;
          for (let i = 0; i < parts.length - 1; i++) {
            const dir = parts[i];
            if (!node.__children) node.__children = {};
            if (!node.__children[dir]) node.__children[dir] = {};
            node = node.__children[dir];
          }
          if (!node.__files) node.__files = [];
          node.__files.push(f);
        }
        return root;
      }

      const tree = React.useMemo(() => buildTree(artifacts), [artifacts]);
      const topDirs = React.useMemo(() => Object.keys(tree.__children || {}).sort(), [tree]);
      const rootFiles = React.useMemo(() => (tree.__files || []).sort((a, b) => a.name.localeCompare(b.name)), [tree]);

      const toggleDir = useCallback((path) => {
        setTreeOpen(prev => ({ ...prev, [path]: !(prev[path] !== undefined ? prev[path] : true) }));
      }, []);

      return (
        <div className="mt-10">
          <div className="flex items-center justify-between mb-4">
            <h3 className="font-heading text-lg font-semibold text-stone-100">产物文件</h3>
          </div>
          {artifacts.length === 0 && <p className="text-stone-500 text-sm">暂无产物文件</p>}
          <div className="bg-ink-900 rounded border border-ink-700 overflow-hidden">
            {rootFiles.map(f => (
              <FileRow key={f.name} file={f} level={0}
                pipelineId={pipelineId} expanded={expanded}
                onView={viewJson} onDownload={download} onCopy={copyToClipboard} onToggle={toggleExpand} />
            ))}
            {topDirs.map(d => (
              <DirNode key={d} name={d} node={tree.__children[d]} level={0} path=""
                treeOpen={treeOpen} onToggleDir={toggleDir}
                expanded={expanded} onView={viewJson} onDownload={download} onCopy={copyToClipboard} onToggle={toggleExpand} pipelineId={pipelineId} />
            ))}
          </div>
        </div>
      );
    }

    function LogViewer({ pipelineId }) {
      const [logs, setLogs] = useState('');
      const [autoScroll, setAutoScroll] = useState(true);
      const logContainerRef = useRef(null);
      const [done, setDone] = useState(false);

      const checkDone = useCallback(async () => {
        try {
          const res = await api(`/pipelines/${pipelineId}`);
          if (res.ok) { const d = await res.json(); setDone(d.status === 'done' || d.status === 'failed'); }
        } catch (_) {}
      }, [pipelineId]);

      useEffect(() => { checkDone(); }, [checkDone]);

      const loadLogs = useCallback(async () => {
        try {
          const res = await api(`/pipelines/${pipelineId}/logs`);
          if (res.ok) {
            const text = await res.text();
            setLogs(text);
          }
        } catch (e) { /* ignore */ }
      }, [pipelineId]);

      useEffect(() => { loadLogs(); }, [loadLogs]);

      useEffect(() => {
        if (done) return;
        const t = setInterval(() => { if (!document.hidden) loadLogs(); }, 15000);
        return () => clearInterval(t);
      }, [loadLogs, done]);

      useEffect(() => {
        if (autoScroll && logContainerRef.current) {
          logContainerRef.current.scrollTop = logContainerRef.current.scrollHeight;
        }
      }, [logs, autoScroll]);

      const handleScroll = () => {
        if (!logContainerRef.current) return;
        const el = logContainerRef.current;
        const isAtBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 50;
        setAutoScroll(isAtBottom);
      };

      return (
        <div className="mt-10">
          <div className="flex items-center justify-between mb-4">
            <h3 className="font-heading text-lg font-semibold text-stone-100">运行日志</h3>
            <label className="flex items-center gap-1.5 text-xs text-stone-400 cursor-pointer">
              <input type="checkbox" checked={autoScroll} onChange={(e) => setAutoScroll(e.target.checked)} className="accent-brass-500" />
              自动滚动
            </label>
          </div>
          <div
            ref={logContainerRef}
            onScroll={handleScroll}
            className="log-viewer bg-ink-950 border border-ink-700 rounded p-4 h-96 overflow-auto font-mono text-xs text-stone-300 whitespace-pre-wrap"
          >
            {logs || <span className="text-stone-500">暂无日志</span>}
          </div>
        </div>
      );
    }

    function StoryboardViewer({ pipelineId, poll, reloadKey }) {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(false);
      const [charPrompts, setCharPrompts] = useState({});
      const [scenePrompts, setScenePrompts] = useState({});
      const [expandedScenes, setExpandedScenes] = useState({ _all: true });
      const [expandedShots, setExpandedShots] = useState({});
      const [expandedChars, setExpandedChars] = useState({ _all: true });
      const [editCharMd, setEditCharMd] = useState({});
      const [editingChar, setEditingChar] = useState({});
      const [savingChar, setSavingChar] = useState({});
      const [editSceneMd, setEditSceneMd] = useState({});
      const [editingScene, setEditingScene] = useState({});
      const [savingScene, setSavingScene] = useState({});
      const [shotPrompts, setShotPrompts] = useState({});
      const [editShotMd, setEditShotMd] = useState({});
      const [editingShotMd, setEditingShotMd] = useState({});
      const [savingShotMd, setSavingShotMd] = useState({});
      const [expandedSb, setExpandedSb] = useState(false);

      const load = useCallback(async () => {
        setLoading(true);
        try {
          const res = await api(`/pipelines/${pipelineId}/artifacts/storyboard.json`);
          if (res.ok) { const d = await res.json(); setData(d); return d; }
        } catch (e) { /* ignore */ }
        finally { setLoading(false); }
        return null;
      }, [pipelineId]);

      useEffect(() => {
        let cancelled = false;
        if (poll) {
          setData(null);
          setCharPrompts({});
          setScenePrompts({});
          setShotPrompts({});
        }
        load();
        if (poll) {
          const t = setInterval(() => {
            if (cancelled || document.hidden) return;
            load();
          }, 10000);
          return () => { cancelled = true; clearInterval(t); };
        }
        return () => { cancelled = true; };
      }, [poll, load, reloadKey]);

      // Load character prompts from .md files
      useEffect(() => {
        if (!data) return;
        const chars = data.characters || [];
        chars.forEach(async (c) => {
          if (charPrompts[c.ref_id]) return;
          try {
            const res = await api(`/pipelines/${pipelineId}/artifacts/characters/${encodeURIComponent(c.ref_id)}.md`);
            if (res.ok) {
              const text = await res.text();
              setCharPrompts(prev => ({ ...prev, [c.ref_id]: text }));
            }
          } catch (_) {}
        });
      }, [data, pipelineId]);

      // Load shot prompts from .md files lazily
      useEffect(() => {
        if (!data) return;
        const shots = data.shots || [];
        shots.forEach(async (s) => {
          if (shotPrompts[s.full_shot_id]) return;
          if (!expandedShots[s.full_shot_id]) return;
          try {
            const res = await api(`/pipelines/${pipelineId}/artifacts/shots/${encodeURIComponent(s.full_shot_id)}/${encodeURIComponent(s.full_shot_id)}.md`);
            if (res.ok) {
              const text = await res.text();
              setShotPrompts(prev => ({ ...prev, [s.full_shot_id]: text }));
            }
          } catch (_) {}
        });
      }, [data, pipelineId, expandedShots]);
      useEffect(() => {
        if (!data) return;
        const scenes = data.scenes || [];
        scenes.forEach(async (s) => {
          if (scenePrompts[s.scene_id]) return;
          try {
            const res = await api(`/pipelines/${pipelineId}/artifacts/scenes/${encodeURIComponent(s.scene_id)}.md`);
            if (res.ok) {
              const text = await res.text();
              setScenePrompts(prev => ({ ...prev, [s.scene_id]: text }));
            }
          } catch (_) {}
        });
      }, [data, pipelineId]);

      const toggleScene = useCallback((sceneId) => {
        setExpandedScenes(prev => ({ ...prev, [sceneId]: !prev[sceneId] }));
      }, []);

      const toggleShot = useCallback((shotId) => {
        setExpandedShots(prev => ({ ...prev, [shotId]: !prev[shotId] }));
      }, []);

      if (!data && loading) return <div className="mt-6 text-stone-500 text-sm">加载分镜中...</div>;
      if (!data) return null;

      const scenes = data.scenes || [];
      const characters = data.characters || [];
      const shots = data.shots || [];

      return (
        <div>
          <h3 className="font-heading text-lg font-semibold text-stone-100 mb-4">
            分镜概览
            <span className="text-stone-400 text-sm font-normal ml-2">
              {characters.length} 角色 · {scenes.length} 场景 · {shots.length} 镜头
            </span>
          </h3>
          <div className="space-y-3">
            {characters.length > 0 && (
              <div className="bg-ink-900 rounded border border-ink-700 overflow-hidden">
                <div
                  className="flex items-center gap-3 p-3 cursor-pointer hover:bg-ink-800 transition-colors"
                  onClick={() => setExpandedChars(prev => ({ ...prev, _all: !prev._all }))}
                >
                  <span className="text-stone-500 text-xs w-3 text-center transition-transform flex-shrink-0" style={{ transform: expandedChars._all ? 'rotate(90deg)' : 'none' }}>▶</span>
                  <h4 className="text-sm font-semibold text-stone-300">角色</h4>
                </div>
                {expandedChars._all && (
                  <div className="border-t border-ink-700">
                    {characters.map((c, idx) => {
                      const open = expandedChars[c.ref_id] || false;
                      const md = charPrompts[c.ref_id] || '';
                      return (
                        <div key={c.ref_id}>
                          <div
                            className="flex items-center gap-3 p-3 bg-ink-950/50 border-b border-ink-700 last:border-b-0 cursor-pointer hover:bg-ink-800/30 transition-colors"
                            onClick={() => setExpandedChars(prev => ({ ...prev, [c.ref_id]: !prev[c.ref_id] }))}
                          >
                            <span className="text-stone-500 text-xs w-3 text-center transition-transform flex-shrink-0" style={{ transform: open ? 'rotate(90deg)' : 'none' }}>▶</span>
                            <div className="relative w-10 h-10 flex-shrink-0">
                              <img
                                src={`/pipelines/${pipelineId}/artifacts/characters/${encodeURIComponent(c.ref_id)}_front.jpg`}
                                alt={c.ref_id}
                                className="w-10 h-10 object-cover rounded-full bg-ink-700 ring-1 ring-ink-600"
                                onError={e => {
                                  const el = e.target;
                                  if (el.src.endsWith('.jpg')) { el.src = el.src.replace('.jpg', '.png'); return; }
                                  el.style.display = 'none';
                                  el.nextElementSibling?.classList.remove('hidden');
                                }}
                              />
                              <div className="w-10 h-10 rounded-full bg-ink-700 ring-1 ring-ink-600 flex items-center justify-center text-stone-500 text-xs hidden absolute inset-0">待生成</div>
                            </div>
                            <span className="text-sm text-stone-200 font-medium">{c.name || c.ref_id}</span>
                            <button
                              onClick={e => { e.stopPropagation(); setEditCharMd(prev => ({ ...prev, [c.ref_id]: md })); setEditingChar(prev => ({ ...prev, [c.ref_id]: !prev[c.ref_id] })); }}
                              className="ml-auto text-stone-500 hover:text-brass-400 transition-colors text-xs px-1.5 py-0.5 rounded cursor-pointer"
                              title={editingChar[c.ref_id] ? '退出编辑' : '编辑 .md'}
                            >{editingChar[c.ref_id] ? '✓' : '✎'}</button>
                          </div>
                          {open && (

    function PipelineDetail({ pipeline, onRefresh, onBack }) {
      const [actionLoading, setActionLoading] = useState(false);
      const [summary, setSummary] = useState(null);
      const [summaryLoading, setSummaryLoading] = useState(false);
      const [maxShotsPerScene, setMaxShotsPerScene] = useState(1);
      const [totalShots, setTotalShots] = useState(1);
      const [totalDuration, setTotalDuration] = useState(1);

      useEffect(() => {
        let cancelled = false;
        setSummary(null);
        setSummaryLoading(true);
        api(`/pipelines/${pipeline.pipeline_id}/summarize`)
          .then(res => res.ok ? res.json() : Promise.resolve(null))
          .then(data => {
            if (!cancelled && data) setSummary(data);
          })
          .catch(() => {})
          .finally(() => { if (!cancelled) setSummaryLoading(false); });
        return () => { cancelled = true; };
      }, [pipeline.pipeline_id]);

      const getCurrentStep = () => {
        if (pipeline.status === 'done') return 5;
        if (pipeline.status === 'running') return Math.max(0, (pipeline.step || 1) - 1);
        if (pipeline.status?.startsWith('step_')) {
          return parseInt(pipeline.status.split('_')[1]) - 1;
        }
        if (pipeline.status === 'failed' || pipeline.status === 'canceled') return Math.max(0, (pipeline.step || 1) - 1);
        return pipeline.step || 0;
      };
      const currentStep = getCurrentStep();
      const pid = pipeline.pipeline_id;

      // Step tab routing via hash
      const getDefaultStep = () => {
        if (pipeline.status === 'done') return 5;
        return Math.min(currentStep + 1, 5);
      };
      const getStepFromHash = () => {
        const m = window.location.hash.match(/\/step\/(\d)/);
        if (m) { const s = parseInt(m[1]); if (s >= 1 && s <= 5) return s; }
        return getDefaultStep();
      };
      const [activeStep, setActiveStep] = useState(getDefaultStep);
      const navigateToStep = (n) => {
        window.location.hash = `#/pipelines/${pid}/step/${n}`;
        setActiveStep(n);
      };
      useEffect(() => {
        const s = getStepFromHash();
        if (s !== activeStep) setActiveStep(s);
        const onHash = () => { const s = getStepFromHash(); if (s !== activeStep) setActiveStep(s); };
        window.addEventListener('hashchange', onHash);
        return () => window.removeEventListener('hashchange', onHash);
      }, [pipeline, activeStep]);

      const runStep = async (step) => {
        setActionLoading(true);
        try {
          const body = step === 1 ? { max_shots_per_scene: maxShotsPerScene, total_shots: totalShots, total_duration: totalDuration } : {};
          await api(`/pipelines/${pid}/steps/${step}`, { method: 'POST', body: JSON.stringify(body) });
          setTimeout(onRefresh, 1000);
        } finally { setActionLoading(false); }
      };

      const cancelStep = async () => {
        try {
          await api(`/pipelines/${pid}/cancel`, { method: 'POST' });
          setTimeout(onRefresh, 1000);
        } catch (_) {}
      };

      const runAll = async () => {
        setActionLoading(true);
        try {
          const startStep = currentStep === 5 ? 1 : currentStep + 1;
          for (let s = startStep; s <= 5; s++) {
            navigateToStep(s);
            const body = s === 1 ? { max_shots_per_scene: maxShotsPerScene, total_shots: totalShots, total_duration: totalDuration } : {};
            await api(`/pipelines/${pid}/steps/${s}`, { method: 'POST', body: JSON.stringify(body) });
            const startTime = Date.now();
            const timeout = 30 * 60 * 1000;
            while (true) {
              await new Promise(r => setTimeout(r, 3000));
              if (Date.now() - startTime > timeout) {
                toast.error(`步骤 ${s} 超时 (30分钟)，请检查后端状态`);
                break;
              }
              const res = await api(`/pipelines/${pid}`);
              if (!res.ok) break;
              const data = await res.json();
              const status = data.status;
              if (status === 'failed' || status === 'canceled') {
                if (status === 'canceled') {
                  toast(`步骤 ${s} 已取消`);
                } else {
                  toast.error(`步骤 ${s} 失败: ${data.error || status}`);
                }
                return; // 停止全部流程
              }
              const currentStep = status?.startsWith('step_') ? parseInt(status.split('_')[1]) : (status === 'done' ? 5 : 0);
              if (currentStep > s || status === 'done') break;
            }
          }
          onRefresh();
        } finally { setActionLoading(false); }
      };

      const del = async () => {
        if (!confirm('确定删除此 pipeline 及其所有产物?')) return;
        try {
          const res = await api(`/pipelines/${pid}`, { method: 'DELETE' });
          if (!res.ok) { toast.error(`删除失败: HTTP ${res.status}`); return; }
          onBack();
        } catch (e) { toast.error(`删除失败: ${e.message}`); }
      };

      return (
        <div className="bg-ink-900 rounded-lg p-6 border border-ink-700">
          <div className="flex items-start justify-between mb-2">
            <div className="flex-1 min-w-0">
              <h2 className="font-heading text-xl font-semibold text-stone-100 truncate" title={pipeline.name}>{pipeline.name || 'Untitled Pipeline'}</h2>
              {summaryLoading && <p className="text-stone-400 text-xs mt-1">正在生成摘要...</p>}
              {summary && summary.summary && (
                <p className="text-stone-300 text-sm mt-1 leading-relaxed">{summary.summary}</p>
              )}
              <div className="flex items-center gap-3 mt-2">
                <StatusBadge status={pipeline.status} />
                <span className="text-stone-400 text-sm">{pipeline.status === 'running' ? `运行中 - 步骤 ${pipeline.step}/5` : currentStep > 0 ? `已完成 ${currentStep}/5` : '未开始'}</span>
                {pipeline.duration && <span className="text-stone-500 text-xs">运行时长: {formatDuration(pipeline.duration)}</span>}
              </div>
            </div>
            <button onClick={del} className="text-xs px-2.5 py-1.5 bg-ink-700 hover:bg-ink-600 text-clay-400 rounded transition-colors ml-4">删除</button>
          </div>

          <StepTabs currentStep={currentStep} pipelineStatus={pipeline.status} activeStep={activeStep} onNavigate={navigateToStep} />

          {pipeline.error && (
            <div className="bg-clay-500/10 border border-clay-500/30 text-clay-400 p-3 rounded text-sm mb-6">
              {pipeline.error}
            </div>
          )}

          <StepView step={activeStep} pipeline={pipeline} onRun={runStep} onCancel={cancelStep} actionLoading={actionLoading} pipelineId={pid}
  maxShotsPerScene={maxShotsPerScene} setMaxShotsPerScene={setMaxShotsPerScene}
  totalShots={totalShots} setTotalShots={setTotalShots}
  totalDuration={totalDuration} setTotalDuration={setTotalDuration} />

          <div className="flex gap-3 mb-6">
            <button onClick={runAll} disabled={actionLoading || pipeline.status === 'done'} className="nav-btn px-4 py-2 bg-brass-500 hover:bg-brass-400 disabled:bg-ink-700 text-ink-950 rounded text-sm font-medium transition-all disabled:text-stone-400">
              运行全部步骤
            </button>
          </div>

          <LogViewer pipelineId={pid} />
          <ArtifactList pipelineId={pid} />

          <div className="mt-8 text-xs text-stone-500 leading-relaxed">
            创建时间: {new Date(pipeline.created_at).toLocaleString()}<br/>
            更新时间: {new Date(pipeline.updated_at).toLocaleString()}
          </div>
        </div>
      );
    }

    function CreatePipeline({ onCreated }) {
      const [scriptFile, setScriptFile] = useState(null);
      const [scriptText, setScriptText] = useState('');
      const [submitting, setSubmitting] = useState(false);
      const [error, setError] = useState('');
      const fileRef = useRef();

      const handleFile = (e) => {
        const f = e.target.files[0];
        if (f) {
          setScriptFile(f);
          const reader = new FileReader();
          reader.onload = (ev) => setScriptText(ev.target.result);
          reader.readAsText(f);
        }
      };

      const submit = async () => {
        setError('');
        if (!scriptFile && !scriptText.trim()) {
          setError('请上传剧本文件或输入剧本内容');
          return;
        }
        setSubmitting(true);
        try {
          const fd = new FormData();
          if (scriptFile) {
            fd.append('script', scriptFile, scriptFile.name || 'script.txt');
          } else {
            const blob = new Blob([scriptText], { type: 'text/plain' });
            fd.append('script', blob, 'script.txt');
          }
          const res = await fetch(`${API_BASE}/pipelines`, { method: 'POST', body: fd });
          if (!res.ok) { const txt = await res.text(); throw new Error(txt || `HTTP ${res.status}`); }
          const data = await res.json();
          onCreated(data.pipeline_id);
        } catch (e) { setError(e.message); }
        finally { setSubmitting(false); }
      };

      return (
        <div className="bg-ink-900 rounded-lg p-8 border border-ink-700">
          <h2 className="font-heading text-lg font-semibold text-stone-100 mb-6">创建新 Pipeline</h2>
          {error && <div className="bg-clay-500/10 border border-clay-500/30 text-clay-400 p-3 rounded text-sm mb-4">{error}</div>}
          <div className="space-y-5">
            <div>
              <label className="block text-sm text-stone-300 mb-1.5 font-medium">上传剧本文件</label>
              <input ref={fileRef} type="file" accept=".txt,.md" onChange={handleFile}
                className="block w-full text-sm text-stone-400 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-medium file:bg-ink-700 file:text-stone-200 hover:file:bg-ink-600 file:transition-colors file:cursor-pointer cursor-pointer" />
            </div>
            <div className="flex items-center gap-3 text-stone-500 text-sm">
              <span className="h-px flex-1 bg-ink-700" />
              <span>或</span>
              <span className="h-px flex-1 bg-ink-700" />
            </div>
            <div>
              <label className="block text-sm text-stone-300 mb-1.5 font-medium">剧本内容</label>
              <textarea
                value={scriptText}
                onChange={(e) => { setScriptText(e.target.value); setScriptFile(null); if(fileRef.current) fileRef.current.value = ''; }}
                rows={8}
                className="w-full bg-ink-950 border border-ink-700 rounded p-3 text-stone-200 text-sm focus:outline-none focus:border-brass-500/50 transition-colors placeholder:text-stone-500"
                placeholder="在此粘贴剧本内容..."
              />
            </div>
            <button onClick={submit} disabled={submitting}
              className="step-btn w-full py-2.5 bg-brass-500 hover:bg-brass-400 disabled:bg-ink-700 text-ink-950 rounded font-medium transition-all disabled:text-stone-400">
              {submitting ? '创建中...' : '创建 Pipeline'}
            </button>
          </div>
        </div>
      );
    }

    const formatDuration = (d) => {
      if (!d) return '';
      return d.replace(/(\d+)\.\d+(s)/g, '$1$2');
    };

    function PipelineList({ onSelect, onCreateNew }) {
      const [items, setItems] = useState([]);
      const [loading, setLoading] = useState(true);
      const [viewMode, setViewMode] = useState('grid');

      const load = useCallback(async () => {
        setLoading(true);
        try {
          const res = await api('/pipelines');
          if (res.ok) {
            const data = await res.json();
            setItems(data.pipelines || []);
          }
        } finally { setLoading(false); }
      }, []);

      useEffect(() => { load(); const t = setInterval(() => { if (!document.hidden) load(); }, 10000); return () => clearInterval(t); }, []);

      const sorted = [...items].sort((a, b) => {
        const ta = new Date(a.created_at).getTime();
        const tb = new Date(b.created_at).getTime();
        return viewMode === 'list' ? ta - tb : tb - ta;
      });

      if (viewMode === 'grid') {
        return (
          <div>
            <div className="flex items-center justify-between mb-4">
              <div />
              <button onClick={() => setViewMode('list')} className="nav-btn text-sm text-stone-400 hover:text-brass-400 transition-colors">列表视图</button>
            </div>
            {loading && items.length === 0 && <p className="text-stone-500">加载中...</p>}
            {items.length === 0 && !loading && (
              <div className="text-center py-20">
                <p className="text-stone-400 mb-4">暂无 Pipeline</p>
                <button onClick={onCreateNew} className="nav-btn px-4 py-2 bg-brass-500 hover:bg-brass-400 text-ink-950 rounded font-medium transition-all">创建 Pipeline</button>
              </div>
            )}
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
              {sorted.map(p => (
                <div key={p.pipeline_id} onClick={() => onSelect(p.pipeline_id)}
                  className="pipeline-card bg-ink-900 p-5 rounded-lg border border-ink-700 cursor-pointer hover:border-brass-500/30 transition-all">
                  <div className="flex items-center justify-between mb-2">
                    <span className="text-stone-100 text-sm font-medium truncate" title={p.name}>{p.name || p.pipeline_id.slice(-8)}</span>
                    <StatusBadge status={p.status} />
                  </div>
                  <div className="text-stone-400 text-xs">步骤 {p.step}/5</div>
                  <div className="mt-3 w-full bg-ink-700 rounded-full h-1 overflow-hidden">
                    <div className="bg-brass-500 h-full rounded-full transition-all duration-500" style={{ width: `${(p.step / 5) * 100}%` }} />
                  </div>
                  <div className="mt-3 text-xs text-stone-500">{new Date(p.updated_at).toLocaleString()}</div>
                  {p.duration && <div className="mt-0.5 text-xs text-stone-500">运行时长: {formatDuration(p.duration)}</div>}
                </div>
              ))}
            </div>
          </div>
        );
      }

      return (
        <div>
          <div className="flex items-center justify-between mb-4">
            <div />
            <button onClick={() => setViewMode('grid')} className="nav-btn text-sm text-stone-400 hover:text-brass-400 transition-colors">卡片视图</button>
          </div>
          {loading && items.length === 0 && <p className="text-stone-500">加载中...</p>}
          {items.length === 0 && !loading && (
            <div className="text-center py-20">
              <p className="text-stone-400 mb-4">暂无 Pipeline</p>
              <button onClick={onCreateNew} className="nav-btn px-4 py-2 bg-brass-500 hover:bg-brass-400 text-ink-950 rounded font-medium transition-all">创建 Pipeline</button>
            </div>
          )}
          <div className="bg-ink-900 rounded-lg border border-ink-700 overflow-hidden">
            <div className="grid grid-cols-12 gap-4 p-3 bg-ink-800 text-xs text-stone-300 font-semibold">
              <div className="col-span-4">名称</div>
              <div className="col-span-2">状态</div>
              <div className="col-span-1">步骤</div>
              <div className="col-span-3">创建时间</div>
              <div className="col-span-2">运行时长</div>
            </div>
            {sorted.map(p => (
              <div key={p.pipeline_id} onClick={() => onSelect(p.pipeline_id)}
                className="grid grid-cols-12 gap-4 p-3 border-t border-ink-700 cursor-pointer hover:bg-ink-800/50 transition-colors">
                <div className="col-span-4 text-stone-100 text-sm font-medium truncate" title={p.name}>{p.name || p.pipeline_id.slice(-8)}</div>
                <div className="col-span-2"><StatusBadge status={p.status} /></div>
                <div className="col-span-1 text-stone-400 text-xs">步骤 {p.step}/5</div>
                <div className="col-span-3 text-stone-400 text-xs">{new Date(p.created_at).toLocaleString()}</div>
                <div className="col-span-2 text-stone-400 text-xs">{formatDuration(p.duration) || '-'}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function App() {
      const [pipelines, setPipelines] = useState([]);
      const [selected, setSelected] = useState(null);
      const [health, setHealth] = useState(null);
      const [currentView, setCurrentView] = useState('list');
      const [pipelineId, setPipelineId] = useState(null);
      const pollRef = useRef(null);

      const getHashView = () => {
        const hash = window.location.hash.replace('#', '');
        if (hash.startsWith('/pipelines/')) return { view: 'detail', id: hash.split('/')[2] };
        if (hash === '/create') return { view: 'create', id: null };
        return { view: 'list', id: null };
      };

      const navigateTo = (view, id = null) => {
        if (view === 'detail' && id) { window.location.hash = `#/pipelines/${id}`; }
        else if (view === 'create') { window.location.hash = '#/create'; }
        else { window.location.hash = '#'; }
      };

      const refreshSelected = useCallback(async () => {
        if (!pipelineId) return;
        try {
          const res = await api(`/pipelines/${pipelineId}`);
          if (res.ok) { const data = await res.json(); setSelected(data); }
        } catch (e) { console.error(e); }
      }, [pipelineId]);

      useEffect(() => {
        const onHashChange = () => {
          const { view: v, id } = getHashView();
          if (v === 'detail' && id) {
            if (currentView === 'detail' && pipelineId === id) return; // step nav only, don't re-fetch
            api(`/pipelines/${id}`).then(res => {
              if (res.ok) {
                res.json().then(data => { setSelected(data); setCurrentView('detail'); setPipelineId(id); });
              } else { navigateTo('list'); }
            });
          } else if (v === 'create') { setCurrentView('create'); setPipelineId(null); setSelected(null); }
          else { setCurrentView('list'); setPipelineId(null); setSelected(null); }
        };
        window.addEventListener('hashchange', onHashChange);
        onHashChange();
        return () => window.removeEventListener('hashchange', onHashChange);
      }, [currentView, pipelineId]);

      useEffect(() => {
        if (currentView !== 'detail' || !selected) return;
        const shouldPoll = selected.status === 'running' || selected.status?.startsWith('step_');
        if (shouldPoll) {
          const poll = () => { if (!document.hidden) refreshSelected(); };
          pollRef.current = setInterval(poll, 10000);
        }
        return () => { if (pollRef.current) { clearInterval(pollRef.current); pollRef.current = null; } };
      }, [currentView, selected, refreshSelected]);

      const selectPipeline = async (id) => { navigateTo('detail', id); };

      useEffect(() => {
        (async () => {
          try { const res = await api('/health'); setHealth(res.ok); }
          catch (e) { setHealth(false); }
        })();
      }, []);

      return (
        <div className="min-h-screen flex flex-col">
          <header className="bg-ink-900 border-b border-ink-700 px-6 py-4 flex items-center justify-between">
            <button onClick={() => navigateTo('list')} className="flex items-center gap-3 hover:opacity-80 transition-opacity">
              <div className="w-9 h-9 bg-brass-500 rounded flex items-center justify-center text-ink-950 font-heading font-bold text-lg">F</div>
              <div>
                <h1 className="font-heading text-lg font-semibold text-stone-100 leading-tight">Film Pipeline Studio</h1>
                <p className="text-xs text-stone-500 leading-tight">AI 剧本到电影</p>
              </div>
            </button>
            <div className="flex items-center gap-4">
              <div className="flex items-center gap-2">
                <div className={`w-2 h-2 rounded-full ${health ? 'bg-leaf-400' : 'bg-clay-500'}`} />
                <span className="text-sm text-stone-400">{health ? '在线' : '离线'}</span>
              </div>
              <button onClick={() => navigateTo('create')}
                className="nav-btn text-sm px-3 py-1.5 bg-brass-500 hover:bg-brass-400 text-ink-950 rounded font-medium transition-all">
                新建 Pipeline
              </button>
            </div>
          </header>

          <main className="flex-1 p-6 overflow-auto">
            {currentView === 'create' && (
              <div className="max-w-xl mx-auto">
                <button onClick={() => navigateTo('list')} className="nav-btn text-sm text-stone-400 hover:text-brass-400 mb-4 transition-colors">← 返回列表</button>
                <CreatePipeline onCreated={(id) => { selectPipeline(id); }} />
              </div>
            )}

            {currentView === 'list' && (
              <div>
                <div className="flex items-center justify-between mb-6">
                  <h2 className="font-heading text-lg font-semibold text-stone-100">Pipeline 列表</h2>
                </div>
                <PipelineList onSelect={selectPipeline} onCreateNew={() => navigateTo('create')} />
              </div>
            )}

            {currentView === 'detail' && selected && (
              <div className="max-w-4xl mx-auto">
                <button onClick={() => navigateTo('list')} className="nav-btn text-sm text-stone-400 hover:text-brass-400 mb-4 transition-colors">← 返回列表</button>
                <PipelineDetail pipeline={selected} onRefresh={refreshSelected} onBack={() => navigateTo('list')} />
              </div>
            )}
          </main>

          <footer className="bg-ink-900 border-t border-ink-700 px-6 py-4 text-center text-xs text-stone-500">
            Film Pipeline Studio — AI Screenplay to Film Pipeline
          </footer>
          <Toaster />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
